      return normalizeOptionValue(status, STATUS_OPTIONS, DEFAULT_STATUS, LEGACY_STATUS_ALIASES);
    }

    function toClassToken(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-|-$/g, '');
    }

    function buildOptionMarkup(options, selectedValue) {
      return options.map(option => `
        <option value="${escHtml(option)}"${option === selectedValue ? ' selected' : ''}>${escHtml(option)}</option>`).join('');
    }

    function renderTaskOptionSets() {
      const taskPriority = document.getElementById('taskPriority');
      const taskStatus = document.getElementById('taskStatus');
      const filterPriority = document.getElementById('filterPriority');
      const filterStatus = document.getElementById('filterStatus');

      if (taskPriority) {
        const selectedPriority = normalizePriority(taskPriority.value || DEFAULT_PRIORITY);
        taskPriority.innerHTML = buildOptionMarkup(PRIORITY_OPTIONS, selectedPriority);
        taskPriority.value = selectedPriority;
      }

      if (taskStatus) {
        const selectedStatus = normalizeStatus(taskStatus.value || DEFAULT_STATUS);
        taskStatus.innerHTML = buildOptionMarkup(STATUS_OPTIONS, selectedStatus);
        taskStatus.value = selectedStatus;
      }

      if (filterPriority) {
        const selectedPriority = filterPriority.value ? normalizePriority(filterPriority.value) : '';
        filterPriority.innerHTML = `<option value="">All Priorities</option>${buildOptionMarkup(PRIORITY_OPTIONS, selectedPriority)}`;
        filterPriority.value = selectedPriority;
      }

      if (filterStatus) {
        const selectedStatus = filterStatus.value ? normalizeStatus(filterStatus.value) : '';
        filterStatus.innerHTML = `<option value="">All Statuses</option>${buildOptionMarkup(STATUS_OPTIONS, selectedStatus)}`;
        filterStatus.value = selectedStatus;
      }
    }

    function getDefaultCategories() {
      return [
        { name: 'General', color: '#64748b' },
        { name: 'Work', color: '#ef7d57' },
        { name: 'Follow-up', color: '#34c38f' },
        { name: 'Personal', color: '#f4b740' }
      ];
    }

    // ── Date Helpers ──
    // formatDate() converts an ISO string (YYYY-MM-DD) to dd-MMM-yyyy.
    // isOverdue() compares a due-date string against today's ISO date string.
    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function toDateParts(value) {
      if (!value) return null;

      if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
        const [year, month, day] = value.split('-').map(Number);
        return { year, month, day };
      }

      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return null;

      return {
        year: parsed.getFullYear(),
        month: parsed.getMonth() + 1,
        day: parsed.getDate()
      };
    }

    function formatDate(iso) {
      const parts = toDateParts(iso);
      if (!parts) return null;

      const day = String(parts.day).padStart(2, '0');
      const month = MONTH_LABELS[parts.month - 1];
      return `${day}-${month}-${parts.year}`;
    }

    function isOverdue(iso) {
      return iso && iso < today();
    }

    function formatDateTime(iso) {
      if (!iso) return null;
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return null;

      const formattedDate = formatDate(date.toISOString().slice(0, 10));
      const formattedTime = date.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      });

      return `${formattedDate} ${formattedTime}`;
    }

    function getTaskById(taskId) {
      return tasks.find(task => task.id === taskId) || null;
    }

    function isTaskCompleted(task) {
      const status = String(task?.status || '').trim();
      return status === 'Done' || status === 'Completed';
    }

    function getCategoryByName(categoryName) {
      return categories.find(category => category.name === categoryName) || null;
    }

    function isProtectedCategory(categoryName) {
      return categoryName === 'General';
    }

    function normalizeCategoryName(name) {
      return String(name || '').trim().replace(/\s+/g, ' ');
    }

    function getCategoryMarkup(categoryName) {
      const category = getCategoryByName(categoryName) || categories[0];
      if (!category) return '';
      return `<span class="badge badge-category" style="--category-color:${escHtml(category.color)}">${escHtml(category.name)}</span>`;
    }

    function getCategoryColor(categoryName) {
      return getCategoryByName(categoryName)?.color || 'transparent';
    }

    function getTemplateById(templateId) {
      return templates.find(template => template.id === templateId) || null;
    }

    function parseSubtaskLines(text) {
      return String(text || '')
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);
    }

    function buildTaskSubtasks(templateId) {
      const template = getTemplateById(templateId);
      if (!template) return [];
      return template.subtasks.map(title => ({ id: genId(), title, done: false }));
    }

    function getCurrentFilters() {
      return {
        search: document.getElementById('searchTasks')?.value.trim().toLowerCase() || '',
        category: document.getElementById('filterCategory')?.value || '',
        priority: document.getElementById('filterPriority')?.value || '',
        status: document.getElementById('filterStatus')?.value || '',
        sort: document.getElementById('sortTasks')?.value || 'workflow'
      };
    }

    function getTaskSearchText(task) {
      return [task.title, task.description, task.emailSubject, task.notes]
        .filter(Boolean)
        .join(' ')
        .toLowerCase();
    }

    function getSubtaskProgress(task) {
      const subtaskCount = task.subtasks?.length || 0;
      const completedCount = (task.subtasks || []).filter(subtask => subtask.done).length;
      return { completedCount, subtaskCount };
    }

    function moveSubtask(task, subtaskId, direction) {
      if (!task) return false;

      const subtasks = [...(task.subtasks || [])];
      const currentIndex = subtasks.findIndex(subtask => subtask.id === subtaskId);
      if (currentIndex === -1) return false;

      const nextIndex = direction === 'up' ? currentIndex - 1 : currentIndex + 1;
      if (nextIndex < 0 || nextIndex >= subtasks.length) return false;

      [subtasks[currentIndex], subtasks[nextIndex]] = [subtasks[nextIndex], subtasks[currentIndex]];
      task.subtasks = subtasks;
      return true;
    }

    function getSubtaskPreview(task) {
      const pendingSubtasks = (task.subtasks || []).filter(subtask => !subtask.done).slice(0, 2);
      if (!pendingSubtasks.length) return 'No open subtasks';
      return pendingSubtasks.map(subtask => subtask.title).join(' • ');
    }

    function getLogPreview(taskId) {
      const taskLogs = getLogsByTaskId(taskId);
      if (!taskLogs.length) return { count: 0, preview: 'No logs yet' };
      return {
        count: taskLogs.length,
        preview: taskLogs[0].content
      };
    }

    function compareTasks(a, b, sortMode) {
      if (sortMode === 'due-date') {
        const dueA = a.dueDate || '9999-12-31';
        const dueB = b.dueDate || '9999-12-31';
        return dueA.localeCompare(dueB) || a.title.localeCompare(b.title);
      }

      if (sortMode === 'created-date') {
        return (b.createdAt || '').localeCompare(a.createdAt || '') || a.title.localeCompare(b.title);
      }

      if (sortMode === 'priority') {
        return ((PRIORITY_ORDER[normalizePriority(a.priority)] ?? PRIORITY_OPTIONS.length)
          - (PRIORITY_ORDER[normalizePriority(b.priority)] ?? PRIORITY_OPTIONS.length))
          || a.title.localeCompare(b.title);
      }

      if (sortMode === 'title') {
        return a.title.localeCompare(b.title);
      }

      const statusOrder = (STATUS_ORDER[normalizeStatus(a.status)] ?? STATUS_OPTIONS.length)
        - (STATUS_ORDER[normalizeStatus(b.status)] ?? STATUS_OPTIONS.length);
      if (statusOrder !== 0) return statusOrder;

      const priorityOrder = (PRIORITY_ORDER[normalizePriority(a.priority)] ?? PRIORITY_OPTIONS.length)
        - (PRIORITY_ORDER[normalizePriority(b.priority)] ?? PRIORITY_OPTIONS.length);
      if (priorityOrder !== 0) return priorityOrder;

      return (a.dueDate || '9999-12-31').localeCompare(b.dueDate || '9999-12-31');
    }

    function getTaskExportRows() {
      return tasks.map(task => {
        const taskLogs = getLogsByTaskId(task.id);
        const { completedCount, subtaskCount } = getSubtaskProgress(task);
        return {
          ID: task.id,
          Title: task.title,
          EmailSubject: task.emailSubject || '',
          Description: task.description || '',
          Category: task.category || '',
          Priority: task.priority || '',
          Status: task.status || '',
          IsCompleted: isTaskCompleted(task) ? 'Yes' : 'No',
          TemplateID: task.templateId || '',
          TemplateName: getTemplateById(task.templateId)?.name || '',
          CreatedAt: task.createdAt || '',
          ReceivedAt: task.receivedAt || '',
          DueDate: task.dueDate || '',
          Notes: task.notes || '',
          SubtaskCount: subtaskCount,
          CompletedSubtaskCount: completedCount,
          OpenSubtaskCount: Math.max(subtaskCount - completedCount, 0),
          LogCount: taskLogs.length,
          LatestLogAt: taskLogs[0]?.createdAt || '',
          Subtasks: (task.subtasks || []).map(subtask => `${subtask.done ? '[x]' : '[ ]'} ${subtask.title}`).join(' | ')
        };
      });
    }

    function getLogExportRows() {
      return logs.map(log => ({
        ID: log.id,
        TaskID: log.taskId,
        TaskTitle: getTaskById(log.taskId)?.title || '',
        Date: log.createdAt || '',
        Content: log.content || ''
      }));
    }

    function buildSheet(rows, headers) {
      return rows.length
        ? XLSX.utils.json_to_sheet(rows, { header: headers })
        : XLSX.utils.aoa_to_sheet([headers]);
    }

    function exportToExcel() {
      if (typeof XLSX === 'undefined') {
        alert('Excel export is unavailable because the XLSX library did not load. Reload the page and try again.');
        return;
      }

      if (!confirm(`Export ${tasks.length} task${tasks.length === 1 ? '' : 's'} and ${logs.length} log${logs.length === 1 ? '' : 's'} to Excel?`)) {
        return;
      }

      const workbook = XLSX.utils.book_new();
      const taskHeaders = ['ID', 'Title', 'EmailSubject', 'Description', 'Category', 'Priority', 'Status', 'IsCompleted', 'TemplateID', 'TemplateName', 'CreatedAt', 'ReceivedAt', 'DueDate', 'Notes', 'SubtaskCount', 'CompletedSubtaskCount', 'OpenSubtaskCount', 'LogCount', 'LatestLogAt', 'Subtasks'];
      const logHeaders = ['ID', 'TaskID', 'TaskTitle', 'Date', 'Content'];

      XLSX.utils.book_append_sheet(workbook, buildSheet(getTaskExportRows(), taskHeaders), 'Tasks');
      XLSX.utils.book_append_sheet(workbook, buildSheet(getLogExportRows(), logHeaders), 'Logs');

      const stamp = new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-');
      XLSX.writeFile(workbook, `task-manager-export-${stamp}.xlsx`);
    }

    function getLogsByTaskId(taskId) {
      return logs
        .filter(log => log.taskId === taskId)
        .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    }

    function ensureSelectedTask() {
      if (selectedTaskId && getTaskById(selectedTaskId)) return;
      selectedTaskId = tasks[0]?.id || null;
    }

    function clearCompletedTasks() {
      const completedTaskIds = tasks
        .filter(task => isTaskCompleted(task))
        .map(task => task.id);

      if (!completedTaskIds.length) {
        return false;
      }

      const completedTaskIdSet = new Set(completedTaskIds);
      tasks = tasks.filter(task => !completedTaskIdSet.has(task.id));
      logs = logs.filter(log => !completedTaskIdSet.has(log.taskId));

      if (selectedTaskId && completedTaskIdSet.has(selectedTaskId)) {
        selectedTaskId = null;
      }

      saveTasks();
      saveLogs();
      renderTasks();
      return true;
    }

    // ── Render Stats ──
    // Rebuilds both the primary stat chips and the secondary micro-stat grid.
    // Called as part of renderTasks() so counts always stay in sync.
    function renderStats() {
      const total   = tasks.length;
      const ongoing = tasks.filter(t => normalizeStatus(t.status) === 'Ongoing').length;
      const done    = tasks.filter(task => isTaskCompleted(task)).length;
      const attention = tasks.filter(task => ATTENTION_PRIORITIES.has(normalizePriority(task.priority)) && !isTaskCompleted(task)).length;
      const statusStats = STATUS_OPTIONS.map(status => ({
        label: status,
        value: status === 'Done'
          ? tasks.filter(task => isTaskCompleted(task)).length
          : tasks.filter(task => normalizeStatus(task.status) === status).length,
        accent: STATUS_ACCENTS[status] || 'var(--accent)',
        itemClass: `is-${toClassToken(status)}`
      }));
      const priorityStats = PRIORITY_OPTIONS.map(priority => ({
        label: priority,
        value: tasks.filter(task => normalizePriority(task.priority) === priority).length,
        accent: PRIORITY_ACCENTS[priority] || 'var(--accent)',
        itemClass: `is-${toClassToken(priority)}`
      }));
      const categoryStats = categories.map(category => ({
        label: category.name,
        value: tasks.filter(task => task.category === category.name).length,
        accent: category.color,
        itemClass: 'is-category'
      }));

      document.getElementById('taskStats').innerHTML = `
        <div class="stat-chip" style="--chip-accent:var(--accent-h)">
          <span class="stat-label">All Tasks</span>
          <strong class="stat-value">${total}</strong>
          <span class="stat-hint">Saved locally</span>
        </div>
        <div class="stat-chip" style="--chip-accent:var(--accent)">
          <span class="stat-label">Ongoing Tasks</span>
          <strong class="stat-value">${ongoing}</strong>
          <span class="stat-hint">Actively in progress</span>
        </div>
        <div class="stat-chip" style="--chip-accent:var(--text-muted)">
          <span class="stat-label">Completed</span>
          <strong class="stat-value">${done}</strong>
          <span class="stat-hint">Closed out</span>
        </div>
        <div class="stat-chip" style="--chip-accent:var(--critical)">
          <span class="stat-label">High / Critical</span>
          <strong class="stat-value" style="color:var(--critical)">${attention}</strong>
          <span class="stat-hint">Open urgent work</span>
        </div>
      `;

      const secondaryGroups = [
        {
          id: 'status',
          title: 'Status',
          accent: 'var(--status-ongoing)',
          total: total,
          items: statusStats
        },
        {
          id: 'priority',
          title: 'Priority',
          accent: 'var(--medium)',
          total: total,
          items: priorityStats
        },
        {
          id: 'category',
          title: 'Category',
          accent: 'var(--accent)',
          total: categoryStats.reduce((sum, item) => sum + item.value, 0),
          items: categoryStats
        }
      ];

      if (!secondaryGroups.some(group => group.id === activeSecondaryStatsTab)) {
        activeSecondaryStatsTab = secondaryGroups[0]?.id || 'status';
      }

      document.getElementById('taskStatsSecondary').innerHTML = `
        <div class="task-stats-secondary-tabs" role="tablist" aria-label="Secondary task stats">
          ${secondaryGroups.map(group => `
            <button
              type="button"
              class="btn task-stats-secondary-tab ${group.id === activeSecondaryStatsTab ? 'is-active' : ''}"
              style="--tab-accent:${group.accent}"
              data-stats-tab="${group.id}"
              role="tab"
              aria-selected="${group.id === activeSecondaryStatsTab ? 'true' : 'false'}"
              aria-controls="stats-group-${group.id}"
            >
              <span>${group.title}</span>
            </button>`).join('')}
        </div>
        ${secondaryGroups.map(group => `
        <section class="stats-group ${group.id === activeSecondaryStatsTab ? 'is-active' : ''}" id="stats-group-${group.id}" style="--group-accent:${group.accent}" role="tabpanel" ${group.id === activeSecondaryStatsTab ? '' : 'hidden'}>
          <div class="stats-group-header">
            <span class="stats-group-title">${group.title}</span>
            <span class="stats-group-total">${group.total}</span>
          </div>
          <div class="stats-group-list">
            ${group.items.map(stat => `
              <div class="micro-stat ${stat.itemClass || ''}" style="--micro-accent:${stat.accent || group.accent}">
                <span class="micro-stat-label">${escHtml(stat.label)}</span>
                <strong class="micro-stat-value">${stat.value}</strong>
              </div>`).join('')}
          </div>
        </section>`).join('')}`;

      updateSecondaryStatsToggle();
    }

    function renderCategoryOptions() {
      const taskCategory = document.getElementById('taskCategory');
      const filterCategory = document.getElementById('filterCategory');
      const currentTaskValue = taskCategory?.value;
      const currentFilterValue = filterCategory?.value;
      const optionHtml = categories.map(category => `
        <option value="${escHtml(category.name)}">${escHtml(category.name)}</option>`).join('');

      if (taskCategory) {
        taskCategory.innerHTML = optionHtml;
        taskCategory.value = getCategoryByName(currentTaskValue)?.name || categories[0]?.name || '';
      }

      if (filterCategory) {
        filterCategory.innerHTML = `<option value="">All Categories</option>${optionHtml}`;
        filterCategory.value = getCategoryByName(currentFilterValue)?.name || '';
      }
    }

    function renderCategoryList() {
      const list = document.getElementById('categoryList');
      if (!list) return;

      list.innerHTML = categories.map(category => {
        const isLocked = isProtectedCategory(category.name);
        const categoryIndex = categories.findIndex(item => item.name === category.name);
        const canMoveUp = !isLocked && categoryIndex > 1;
        const canMoveDown = !isLocked && categoryIndex < categories.length - 1;
        return `
          <div class="category-item">
            <div class="category-item-main">
              <span class="category-dot" style="--category-color:${escHtml(category.color)}"></span>
              <div class="category-item-summary">
                <div class="category-item-name">${escHtml(category.name)}</div>
                <div class="category-item-meta">${escHtml(category.color)}</div>
              </div>
            </div>
            ${isLocked
              ? '<div class="category-item-locked">Required</div>'
              : `<div class="category-item-actions">
                  <div class="category-move-actions" aria-label="Reorder category">
                    <button class="btn btn-ghost category-move-btn" type="button" data-move-category="${escHtml(category.name)}" data-move-direction="up" ${canMoveUp ? '' : 'disabled'} aria-label="Move category up" title="Move up">↑</button>
                    <button class="btn btn-ghost category-move-btn" type="button" data-move-category="${escHtml(category.name)}" data-move-direction="down" ${canMoveDown ? '' : 'disabled'} aria-label="Move category down" title="Move down">↓</button>
                  </div>
                  <button class="btn btn-ghost task-open-btn" type="button" data-edit-category="${escHtml(category.name)}">Edit</button>
                  <button class="btn btn-danger" type="button" data-delete-category="${escHtml(category.name)}">Delete</button>
                </div>`}
          </div>`;
      }).join('');
    }

    function renderTemplateOptions() {
      const taskTemplate = document.getElementById('taskTemplate');
      if (!taskTemplate) return;
      const currentValue = taskTemplate.value;
      taskTemplate.innerHTML = `<option value="">No Template</option>${templates.map(template => `
        <option value="${escHtml(template.id)}">${escHtml(template.name)}</option>`).join('')}`;
      taskTemplate.value = getTemplateById(currentValue)?.id || '';
    }

    function renderTemplateList() {
      const list = document.getElementById('templateList');
      if (!list) return;

      if (!templates.length) {
        list.innerHTML = '<div class="log-empty">No templates yet.</div>';
        return;
      }

      list.innerHTML = templates.map(template => `
        <div class="template-item">
          <div class="template-item-header">
            <div class="template-item-summary">
              <div class="template-item-name">${escHtml(template.name)}</div>
              <div class="category-item-meta">${template.subtasks.length} subtask${template.subtasks.length === 1 ? '' : 's'}</div>
            </div>
            <div class="task-actions">
              <button class="btn btn-ghost task-open-btn" type="button" data-edit-template="${template.id}">Edit</button>
              <button class="btn btn-danger" type="button" data-delete-template="${template.id}">Delete</button>
            </div>
          </div>
          <div class="template-subtask-preview">
            ${template.subtasks.length ? template.subtasks.map(item => `<span>${escHtml(item)}</span>`).join('') : '<span>No subtasks defined.</span>'}
          </div>
        </div>`).join('');
    }

    // ── Render Task List ──
    // Master render function: refreshes stats, filters, sorts, then rebuilds
    // the task card list and the detail panel for the selected task.
    function renderTasks() {
      renderStats();
      renderCategoryOptions();
      renderTemplateOptions();
      renderTaskOptionSets();

      const filters = getCurrentFilters();

      let visible = tasks.filter(t => {
        if (hideDone && isTaskCompleted(t)) return false;
        if (filters.category && t.category !== filters.category) return false;
        if (filters.priority && t.priority !== filters.priority) return false;
        if (filters.status && t.status !== filters.status) return false;
        if (filters.search && !getTaskSearchText(t).includes(filters.search)) return false;
        return true;
      });

      const list = document.getElementById('taskList');
      ensureSelectedTask();

      if (visible.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
            </svg>
            <p>No tasks found</p>
            <small>${tasks.length === 0 ? 'Create your first task with the button above, or start from a reusable template.' : 'Try adjusting your filters to bring matching tasks back into view.'}</small>
          </div>`;
        renderTaskDetails();
        return;
      }

      visible.sort((a, b) => compareTasks(a, b, filters.sort));

      list.innerHTML = visible.map(t => {
        const priority = normalizePriority(t.priority);
        const status = normalizeStatus(t.status);
        const priorityClass = `priority-${toClassToken(priority)}`;
        const statusClass   = `status-${toClassToken(status)}`;
        const overdue = isOverdue(t.dueDate) && !isTaskCompleted(t);
        const dueTxt  = t.dueDate ? `Due ${formatDate(t.dueDate)}` : '';
        const categoryColor = getCategoryColor(t.category);

        const isActive = t.id === selectedTaskId;
        const logData = getLogPreview(t.id);
        return `
          <div class="task-card ${priorityClass} ${statusClass} ${isActive ? 'is-active' : ''}" data-id="${t.id}" style="--category-color:${escHtml(categoryColor)}">
            <div class="task-card-body">
              <div class="task-main">
                <div class="task-heading">
                  <button class="quick-toggle ${isTaskCompleted(t) ? 'is-done' : ''}" data-toggle-complete="${t.id}" title="Toggle complete">${isTaskCompleted(t) ? '✓' : ''}</button>
                  <div class="task-heading-main">
                    <div class="task-title">${escHtml(t.title)}</div>
                    ${t.emailSubject ? `<div class="task-email-subject">Email: ${escHtml(t.emailSubject)}</div>` : ''}
                    <div class="task-info-strip">
                      <div class="task-meta">
                        ${getCategoryMarkup(t.category)}
                        <span class="badge badge-${toClassToken(priority)}">${escHtml(priority)}</span>
                        <span class="badge badge-${toClassToken(status)}">${escHtml(status)}</span>
                        <span class="task-date">${logData.count} log${logData.count === 1 ? '' : 's'}</span>
                      </div>
                      <div class="task-preview-list">
                        <div class="task-preview-dates">
                          ${t.createdAt ? `<div class="task-preview-date is-created"><span class="task-preview-date-label">Created</span><span class="task-preview-date-value">${escHtml(formatDate(t.createdAt))}</span></div>` : ''}
                          ${t.receivedAt ? `<div class="task-preview-date is-received"><span class="task-preview-date-label">Received</span><span class="task-preview-date-value">${escHtml(formatDate(t.receivedAt))}</span></div>` : ''}
                          ${t.dueDate ? `<div class="task-preview-date is-due ${overdue ? 'overdue' : ''}"><span class="task-preview-date-label">Due</span><span class="task-preview-date-value">${overdue ? 'Overdue ' : ''}${escHtml(formatDate(t.dueDate))}</span></div>` : ''}
                        </div>
                      </div>
                    </div>
                    <div class="task-description-block ${t.description ? '' : 'is-empty'}">${t.description ? escHtml(t.description) : 'No description'}</div>
                  </div>
                </div>
              </div>
              <div class="task-actions">
                <div class="task-action-item is-wide">
                  <span class="task-action-label">Priority</span>
                  <select class="priority-select" data-id="${t.id}" title="Change priority">
                    ${buildOptionMarkup(PRIORITY_OPTIONS, priority)}
                  </select>
                </div>
                <div class="task-action-item is-wide">
                  <span class="task-action-label">Status</span>
                  <select class="status-select" data-id="${t.id}" title="Change status">
                    ${buildOptionMarkup(STATUS_OPTIONS, status)}
                  </select>
                </div>
                <div class="task-action-item">
                  <button class="btn btn-ghost" data-edit="${t.id}" title="Edit task">Edit</button>
                </div>
                <div class="task-action-item">
                  <button class="btn btn-danger" data-delete="${t.id}" title="Delete task">Delete</button>
                </div>
              </div>
            </div>
          </div>`;
      }).join('');

      renderTaskDetails();
    }

    function renderTaskDetails() {
      const panel = document.getElementById('taskDetailPanel');
      closeDetailContextMenu();
      const task = getTaskById(selectedTaskId);

      if (!task) {
        panel.innerHTML = `
          <div class="detail-empty">
            <div>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true">
                <path d="M8 3.5h8l4 4V20a1 1 0 0 1-1 1H8a4 4 0 0 1-4-4V7.5a4 4 0 0 1 4-4Z"/>
                <path d="M16 3.5V8h4"/>
                <path d="M8.5 12h7"/>
                <path d="M8.5 15.5h7"/>
              </svg>
              <p>Select a task to open the detail pane</p>
              <small>Notes, subtasks, timestamps, and log history appear here once you choose a task from the queue.</small>
            </div>
          </div>`;
        return;
      }

      const taskLogs = getLogsByTaskId(task.id);
      const priority = normalizePriority(task.priority);
      const status = normalizeStatus(task.status);
      const dueClass = isOverdue(task.dueDate) && status !== 'Done' ? 'overdue' : '';
      const categoryColor = getCategoryColor(task.category);
      const template = getTemplateById(task.templateId);
      const subtaskCount = task.subtasks?.length || 0;
      const completedSubtasks = (task.subtasks || []).filter(subtask => subtask.done).length;
      const detailTabs = [
        {
          id: 'description',
          label: 'Description',
          accent: 'var(--accent)',
          meta: null,
          panelClass: 'detail-description',
          content: `
            <div class="detail-section-header">
              <div class="section-title">Description</div>
              <span class="detail-section-meta">${task.description ? 'Summary' : 'No description'}</span>
            </div>
            <div class="detail-section-body">
              <p>${task.description ? escHtml(task.description) : 'No description added for this task yet.'}</p>
            </div>`
        },
        {
          id: 'subtasks',
          label: 'Subtasks',
          accent: 'var(--medium)',
          meta: `${completedSubtasks}/${subtaskCount} complete`,
          panelClass: 'subtasks-section',
          content: `
            <div class="detail-section-header">
              <div class="section-title">Subtasks</div>
              <span class="detail-section-meta">${completedSubtasks}/${subtaskCount} complete</span>
            </div>
            <form class="subtask-form" id="subtaskForm">
              <input type="text" id="subtaskTitle" class="subtask-input" placeholder="Add a subtask to this task..." required />
              <button type="submit" class="btn btn-primary">Add Subtask</button>
            </form>
            ${task.subtasks?.length ? `
              <div class="subtask-list-shell">
                <div class="subtask-list">
                  ${task.subtasks.map((subtask, index) => `
                    <div class="subtask-item ${subtask.done ? 'is-done' : ''}">
                      <label class="subtask-item-main">
                        <input type="checkbox" data-toggle-subtask="${subtask.id}" ${subtask.done ? 'checked' : ''} />
                        <span>${escHtml(subtask.title)}</span>
                      </label>
                      <div class="subtask-item-actions">
                        <button type="button" class="btn btn-ghost subtask-move-btn" data-move-subtask="${subtask.id}" data-move-direction="up" ${index === 0 ? 'disabled' : ''} aria-label="Move subtask up" title="Move up">↑</button>
                        <button type="button" class="btn btn-ghost subtask-move-btn" data-move-subtask="${subtask.id}" data-move-direction="down" ${index === task.subtasks.length - 1 ? 'disabled' : ''} aria-label="Move subtask down" title="Move down">↓</button>
                        <button type="button" class="btn btn-danger subtask-delete-btn" data-delete-subtask="${subtask.id}">Remove</button>
                      </div>
                    </div>`).join('')}
                </div>
              </div>` : '<div class="subtask-empty">No subtasks yet. Add one above.</div>'}`
        },
        {
          id: 'logs',
          label: 'Logs',
          accent: 'var(--status-ongoing)',
          meta: `${taskLogs.length} entr${taskLogs.length === 1 ? 'y' : 'ies'}`,
          panelClass: 'logs-section',
          content: `
            <div class="detail-section-header">
              <div class="section-title">Logs</div>
              <span class="detail-section-meta">${taskLogs.length} entr${taskLogs.length === 1 ? 'y' : 'ies'}</span>
            </div>
            <form class="logs-form" id="logForm">
              <textarea id="logContent" class="log-input" placeholder="Write a clear progress update, handoff note, or follow-up..." required></textarea>
              <div class="logs-meta">
                <span>Entries stay linked to this task in local storage.</span>
                <button type="submit" class="btn btn-primary log-submit-btn">Add Log</button>
              </div>
            </form>
            <div class="log-list-shell">
              <div class="log-list">
                ${taskLogs.length ? taskLogs.map(log => `
                  <article class="log-entry">
                    <div class="log-entry-main">
                      <div class="log-entry-header">
                        <strong>Update</strong>
                        <span class="log-entry-time">${escHtml(formatDateTime(log.createdAt) || '')}</span>
                      </div>
                      <div class="log-entry-body">${escHtml(log.content)}</div>
                    </div>
                    <button class="btn btn-danger" data-delete-log="${log.id}">Delete</button>
                  </article>`).join('') : '<div class="log-empty">No logs yet for this task.</div>'}
              </div>
            </div>`
        },
        ...(task.notes ? [{
          id: 'notes',
          label: 'Notes',
          accent: 'var(--low)',
          meta: null,
          panelClass: 'detail-notes',
          content: `
            <div class="detail-section-header">
              <div class="section-title">Task Notes</div>
              <span class="detail-section-meta">Reference</span>
            </div>
            <div class="detail-section-body">
              <p>${escHtml(task.notes)}</p>
            </div>`
        }] : [])
      ];
      const availableTabIds = new Set(detailTabs.map(tab => tab.id));

      if (!availableTabIds.has(activeDetailTab)) {
        activeDetailTab = detailTabs[0]?.id || 'description';
      }

      panel.innerHTML = `
        <div class="detail-header" style="--category-color:${escHtml(categoryColor)}">
          <div class="detail-header-main">
            <div class="section-title">Task Details</div>
            <div class="detail-title">${escHtml(task.title)}</div>
            <div class="task-meta">
              ${getCategoryMarkup(task.category)}
              <span class="badge badge-${toClassToken(priority)}">${escHtml(priority)}</span>
              <span class="badge badge-${toClassToken(status)}">${escHtml(status)}</span>
              ${template ? `<span class="badge badge-category" style="--category-color:${escHtml(categoryColor)}">Template: ${escHtml(template.name)}</span>` : ''}
            </div>
          </div>
          <button class="btn btn-ghost" data-edit="${task.id}">Edit</button>
        </div>

        <div class="detail-submeta">
          <div class="detail-row is-full-width"><span>Email Subject</span><strong>${task.emailSubject ? escHtml(task.emailSubject) : 'N/A'}</strong></div>
          <div class="detail-row is-date is-created"><span>Created</span><strong>${task.createdAt ? escHtml(formatDate(task.createdAt)) : 'N/A'}</strong></div>
          <div class="detail-row is-date is-received"><span>Received</span><strong>${task.receivedAt ? escHtml(formatDate(task.receivedAt)) : 'N/A'}</strong></div>
          <div class="detail-row is-date is-due ${dueClass}"><span>Due</span><strong>${task.dueDate ? escHtml(formatDate(task.dueDate)) : 'N/A'}</strong></div>
        </div>

        <div class="detail-stack">
          <div class="detail-tabs" role="tablist" aria-label="Task detail sections">
            ${detailTabs.map(tab => `
              <button
                type="button"
                class="btn btn-ghost detail-tab-btn ${tab.id === activeDetailTab ? 'is-active' : ''}"
                style="--tab-accent:${tab.accent}"
                data-detail-tab="${tab.id}"
                role="tab"
                id="detail-tab-${tab.id}"
                aria-selected="${tab.id === activeDetailTab ? 'true' : 'false'}"
                aria-controls="detail-panel-${tab.id}"
              >
                <span>${tab.label}</span>
                ${tab.meta ? `<span class="detail-tab-badge">${escHtml(tab.meta)}</span>` : ''}
              </button>`).join('')}
          </div>

          <div class="detail-tab-panels">
            ${detailTabs.map(tab => `
              <section
                class="detail-section ${tab.panelClass} ${tab.id === activeDetailTab ? 'is-active' : ''}"
                id="detail-panel-${tab.id}"
                role="tabpanel"
                aria-labelledby="detail-tab-${tab.id}"
                ${tab.id === activeDetailTab ? '' : 'hidden'}
              >
                ${tab.content}
              </section>`).join('')}
          </div>
        </div>`;

      applyInputLimits();
    }

    // ── Escape HTML ──
    // Sanitises any user-supplied string before inserting it into innerHTML.
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Modal Helpers ──
    // openModal(id) populates the task form for editing an existing task,
    // or resets it to defaults when id is null (new task).
    function openModal(taskId = null) {
      editingId = taskId;
      const modal = document.getElementById('taskModal');
      const form  = document.getElementById('taskForm');
      const title = document.getElementById('modalTitle');
      const submit = document.getElementById('submitTaskBtn');

      form.reset();
      renderTaskOptionSets();

      if (taskId) {
        const t = tasks.find(x => x.id === taskId);
        if (!t) return;
        title.textContent  = 'Edit Task';
        submit.textContent = 'Save Changes';
        document.getElementById('taskTitle').value      = t.title;
        document.getElementById('taskTemplate').value   = getTemplateById(t.templateId)?.id || '';
        document.getElementById('taskEmailSubject').value = t.emailSubject || '';
        document.getElementById('taskDescription').value = t.description || '';
        document.getElementById('taskCategory').value   = getCategoryByName(t.category)?.name || categories[0]?.name || '';
        document.getElementById('taskPriority').value   = normalizePriority(t.priority);
        document.getElementById('taskStatus').value     = normalizeStatus(t.status);
        document.getElementById('taskReceivedAt').value = t.receivedAt || '';
        document.getElementById('taskDueDate').value    = t.dueDate    || '';
        document.getElementById('taskNotes').value      = t.notes      || '';
      } else {
        title.textContent  = 'New Task';
        submit.textContent = 'Create Task';
        document.getElementById('taskTemplate').value   = '';
        document.getElementById('taskEmailSubject').value = '';
        document.getElementById('taskDescription').value = '';
        document.getElementById('taskCategory').value   = categories[0]?.name || '';
        document.getElementById('taskPriority').value   = DEFAULT_PRIORITY;
        document.getElementById('taskStatus').value     = DEFAULT_STATUS;
        document.getElementById('taskReceivedAt').value = today();
      }

      modal.classList.add('open');
      document.getElementById('taskTitle').focus();
    }

    function closeModal() {
      document.getElementById('taskModal').classList.remove('open');
      editingId = null;
    }

    function bindBackdropDismiss(backdropId, closeHandler) {
      const backdrop = document.getElementById(backdropId);
      if (!backdrop || typeof closeHandler !== 'function') return;

      let startedOnBackdrop = false;

      backdrop.addEventListener('pointerdown', event => {
        startedOnBackdrop = event.target === backdrop;
      });

      backdrop.addEventListener('pointercancel', () => {
        startedOnBackdrop = false;
      });

      backdrop.addEventListener('click', event => {
        const clickedBackdrop = event.target === backdrop;
        const shouldClose = clickedBackdrop && startedOnBackdrop;
        startedOnBackdrop = false;
        if (shouldClose) {
          closeHandler();
        }
      });
    }

    function moveCategory(categoryName, direction) {
      if (isProtectedCategory(categoryName)) return false;

      const currentIndex = categories.findIndex(category => category.name === categoryName);
      if (currentIndex === -1) return false;

      const nextIndex = direction === 'up' ? currentIndex - 1 : currentIndex + 1;
      if (nextIndex < 1 || nextIndex >= categories.length) return false;

      [categories[currentIndex], categories[nextIndex]] = [categories[nextIndex], categories[currentIndex]];
      return true;
    }

    // ── Form Submit ──
    // Handles both create and edit: updates the in-memory tasks array,
    // persists to localStorage, and re-renders.
    document.getElementById('taskForm').addEventListener('submit', e => {
      e.preventDefault();
      const title = document.getElementById('taskTitle').value.trim();
      if (!title) {
        document.getElementById('taskTitle').focus();
        return;
      }

      const data = {
        title,
        templateId: document.getElementById('taskTemplate').value || null,
        emailSubject: document.getElementById('taskEmailSubject').value.trim() || null,
        description: document.getElementById('taskDescription').value.trim() || null,
        category:   document.getElementById('taskCategory').value,
        priority:   normalizePriority(document.getElementById('taskPriority').value),
        status:     normalizeStatus(document.getElementById('taskStatus').value),
        receivedAt: document.getElementById('taskReceivedAt').value || null,
        dueDate:    document.getElementById('taskDueDate').value    || null,
        notes:      document.getElementById('taskNotes').value.trim() || null,
      };

      if (editingId) {
        const idx = tasks.findIndex(t => t.id === editingId);
        if (idx !== -1) {
          const previousTask = tasks[idx];
          const nextSubtasks = previousTask.templateId !== data.templateId
            ? buildTaskSubtasks(data.templateId)
            : previousTask.subtasks || [];
          Object.assign(tasks[idx], data, { subtasks: nextSubtasks });
        }
      } else {
        const newTask = {
          id: genId(),
          createdAt: today(),
          subtasks: buildTaskSubtasks(data.templateId),
          ...data
        };
        tasks.unshift(newTask);
        selectedTaskId = newTask.id;
      }

      saveTasks();
      renderTasks();
      closeModal();
    });

    // ── Event Delegation: task list ──
    // Single click listener on the list container handles quick-toggle (circle
    // button), card selection, edit, and delete via data-* attributes.
    document.getElementById('taskList').addEventListener('click', e => {
      const editId   = e.target.closest('[data-edit]')?.dataset.edit;
      const deleteId = e.target.closest('[data-delete]')?.dataset.delete;
      const completeId = e.target.closest('[data-toggle-complete]')?.dataset.toggleComplete;

      if (completeId) {
        const task = tasks.find(item => item.id === completeId);
        if (!task) return;
        task.status = normalizeStatus(task.status) === 'Done' ? DEFAULT_STATUS : 'Done';
        saveTasks();
        renderTasks();
        return;
      }

      const card = e.target.closest('.task-card');
      if (card && !e.target.closest('.task-actions')) {
        selectedTaskId = card.dataset.id;
        renderTasks();
        return;
      }

      if (editId) { openModal(editId); return; }

      if (deleteId) {
        if (confirm('Delete this task?')) {
          tasks = tasks.filter(t => t.id !== deleteId);
          logs = logs.filter(log => log.taskId !== deleteId);
          if (selectedTaskId === deleteId) {
            selectedTaskId = null;
          }
          saveTasks();
          saveLogs();
          renderTasks();
        }
      }
    });

    document.getElementById('taskList').addEventListener('change', e => {
      const prioritySelect = e.target.closest('.priority-select');
      const select = e.target.closest('.status-select');
      if (prioritySelect) {
        const task = tasks.find(t => t.id === prioritySelect.dataset.id);
        if (!task) return;
        task.priority = normalizePriority(prioritySelect.value);
        saveTasks();
        renderTasks();
        return;
      }

      if (!select) return;
      const task = tasks.find(t => t.id === select.dataset.id);
      if (task) {
        task.status = normalizeStatus(select.value);
        saveTasks();
        renderTasks();
      }
    });

    document.getElementById('taskList').addEventListener('contextmenu', e => {
      const card = e.target.closest('.task-card');
      if (!card) return;
      if (e.target.closest('input, textarea, select, button')) return;

      e.preventDefault();
      selectedTaskId = card.dataset.id;
      renderTasks();
      openDetailContextMenu(e.clientX, e.clientY);
    });

    document.getElementById('taskDetailPanel').addEventListener('click', e => {
      const editId = e.target.closest('[data-edit]')?.dataset.edit;
      const detailTabId = e.target.closest('[data-detail-tab]')?.dataset.detailTab;
      const deleteLogId = e.target.closest('[data-delete-log]')?.dataset.deleteLog;
      const toggleSubtaskId = e.target.closest('[data-toggle-subtask]')?.dataset.toggleSubtask;
      const deleteSubtaskId = e.target.closest('[data-delete-subtask]')?.dataset.deleteSubtask;
      const moveSubtaskId = e.target.closest('[data-move-subtask]')?.dataset.moveSubtask;
      const moveDirection = e.target.closest('[data-move-direction]')?.dataset.moveDirection;

      if (detailTabId) {
        activeDetailTab = detailTabId;
        renderTaskDetails();
        return;
      }

      if (editId) {
        openModal(editId);
        return;
      }

      if (deleteSubtaskId) {
        const task = getTaskById(selectedTaskId);
        if (!task) return;
        if (!confirm('Delete this subtask?')) return;
        task.subtasks = (task.subtasks || []).filter(subtask => subtask.id !== deleteSubtaskId);
        saveTasks();
        renderTasks();
        return;
      }

      if (toggleSubtaskId) {
        const task = getTaskById(selectedTaskId);
        if (!task) return;
        task.subtasks = (task.subtasks || []).map(subtask => subtask.id === toggleSubtaskId
          ? { ...subtask, done: !subtask.done }
          : subtask);
        saveTasks();
        renderTasks();
        return;
      }

      if (moveSubtaskId) {
        const task = getTaskById(selectedTaskId);
        if (!task || !moveDirection) return;
        if (!moveSubtask(task, moveSubtaskId, moveDirection)) return;
        saveTasks();
        renderTasks();
        return;
      }

      if (deleteLogId) {
        if (confirm('Delete this log entry?')) {
          logs = logs.filter(log => log.id !== deleteLogId);
          saveLogs();
          renderTasks();
        }
      }
    });

    document.getElementById('taskDetailPanel').addEventListener('contextmenu', e => {
      if (!selectedTaskId) return;
      if (e.target.closest('input, textarea, select, button')) return;
      if (!e.target.closest('.detail-header, .detail-submeta, .detail-stack, .detail-section')) return;

      e.preventDefault();
      openDetailContextMenu(e.clientX, e.clientY);
    });

    document.getElementById('detailContextMenu').addEventListener('click', e => {
      const action = e.target.closest('[data-context-action]')?.dataset.contextAction;
      if (!action) return;

      const task = getTaskById(selectedTaskId);
      closeDetailContextMenu();
      if (!task) return;

      if (action === 'edit') {
        openModal(task.id);
        return;
      }

      if (action === 'toggle-status') {
        task.status = isTaskCompleted(task) ? DEFAULT_STATUS : 'Done';
        saveTasks();
        renderTasks();
        return;
      }

      if (action === 'show-description') {
        activeDetailTab = 'description';
        renderTaskDetails();
        return;
      }

      if (action === 'show-subtasks') {
        activeDetailTab = 'subtasks';
        renderTaskDetails();
        return;
      }

      if (action === 'show-logs') {
        activeDetailTab = 'logs';
        renderTaskDetails();
        return;
      }

      if (action === 'duplicate') {
        const duplicatedTask = {
          ...task,
          id: genId(),
          title: `${task.title} (Copy)`,
          createdAt: today(),
          subtasks: (task.subtasks || []).map(subtask => ({
            ...subtask,
            id: genId()
          }))
        };
        tasks.unshift(duplicatedTask);
        selectedTaskId = duplicatedTask.id;
        saveTasks();
        renderTasks();
        return;
      }

      if (action === 'delete') {
        if (!confirm('Delete this task?')) return;
        tasks = tasks.filter(item => item.id !== task.id);
        logs = logs.filter(log => log.taskId !== task.id);
        if (selectedTaskId === task.id) {
          selectedTaskId = null;
        }
        saveTasks();
        saveLogs();
        renderTasks();
      }
    });

    document.getElementById('taskDetailPanel').addEventListener('submit', e => {
      if (e.target.id === 'subtaskForm') {
        e.preventDefault();
        const subtaskField = document.getElementById('subtaskTitle');
        const subtaskTitle = subtaskField.value.trim();
        const task = getTaskById(selectedTaskId);

        if (!subtaskTitle || !task) {
          subtaskField?.focus();
          return;
        }

        task.subtasks = [...(task.subtasks || []), { id: genId(), title: subtaskTitle, done: false }];
        saveTasks();
        renderTasks();
        document.getElementById('subtaskTitle')?.focus();
        return;
      }

      if (e.target.id !== 'logForm') return;
      e.preventDefault();

      const contentField = document.getElementById('logContent');
      const content = contentField.value.trim();
      if (!content || !selectedTaskId) {
        contentField?.focus();
        return;
      }

      logs.unshift({
        id: genId(),
        taskId: selectedTaskId,
        content,
        createdAt: new Date().toISOString()
      });

      saveLogs();
      renderTasks();
      document.getElementById('logContent')?.focus();
    });

    document.getElementById('categoryForm').addEventListener('submit', e => {
      e.preventDefault();
      const name = normalizeCategoryName(document.getElementById('categoryName').value);
      const color = document.getElementById('categoryColor').value;

      if (!name) {
        document.getElementById('categoryName').focus();
        return;
      }

      if (editingCategoryName && isProtectedCategory(editingCategoryName) && name !== 'General') {
        document.getElementById('categoryName').value = 'General';
        document.getElementById('categoryName').focus();
        return;
      }

      const duplicate = categories.find(category => category.name.toLowerCase() === name.toLowerCase() && category.name !== editingCategoryName);
      if (duplicate) {
        document.getElementById('categoryName').focus();
        return;
      }

      if (editingCategoryName) {
        categories = categories.map(category => {
          if (category.name !== editingCategoryName) return category;
          return { name, color };
        });
        tasks = tasks.map(task => task.category === editingCategoryName ? { ...task, category: name } : task);
      } else {
        categories.push({ name, color });
      }

      editingCategoryName = null;
      document.getElementById('submitCategoryBtn').textContent = 'Save Category';
      document.getElementById('categoryForm').reset();
      document.getElementById('categoryColor').value = '#5b8def';
      syncCategoryColorPresets('#5b8def');
      saveCategories();
      saveTasks();
      renderCategoryList();
      renderTasks();
    });

    document.getElementById('categoryForm').addEventListener('click', e => {
      const presetButton = e.target.closest('[data-category-color]');
      if (!presetButton) return;

      const colorField = document.getElementById('categoryColor');
      colorField.value = presetButton.dataset.categoryColor;
      syncCategoryColorPresets(colorField.value);
    });

    document.getElementById('categoryColor').addEventListener('input', e => {
      syncCategoryColorPresets(e.target.value);
    });

    document.getElementById('templateForm').addEventListener('submit', e => {
      e.preventDefault();
      const name = normalizeCategoryName(document.getElementById('templateName').value);
      const subtasks = parseSubtaskLines(document.getElementById('templateSubtasks').value);

      if (!name) {
        document.getElementById('templateName').focus();
        return;
      }

      const duplicate = templates.find(template => template.name.toLowerCase() === name.toLowerCase() && template.id !== editingTemplateId);
      if (duplicate) {
        document.getElementById('templateName').focus();
        return;
      }

      if (editingTemplateId) {
        templates = templates.map(template => template.id === editingTemplateId ? { ...template, name, subtasks } : template);
      } else {
        templates.unshift({ id: genId(), name, subtasks });
      }

      editingTemplateId = null;
      document.getElementById('templateForm').reset();
      document.getElementById('submitTemplateBtn').textContent = 'Save Template';
      saveTemplates();
      renderTemplateList();
      renderTasks();
    });

    // ── Filters ──
    // All filter/sort controls call renderTasks() directly; no state is
    // persisted for filters (they reset on page reload by design).
    document.getElementById('searchTasks').addEventListener('input', renderTasks);
    document.getElementById('filterCategory').addEventListener('change', renderTasks);
    document.getElementById('filterPriority').addEventListener('change', renderTasks);
    document.getElementById('filterStatus').addEventListener('change', renderTasks);
    document.getElementById('sortTasks').addEventListener('change', renderTasks);

    // ── Toggle Done ──
    // hideDone is persisted to localStorage so the preference survives reloads.
    document.getElementById('toggleDoneBtn').addEventListener('click', () => {
      hideDone = !hideDone;
      saveHideDonePreference();
      document.getElementById('toggleDoneBtn').textContent = hideDone ? 'Show Completed' : 'Hide Completed';
      renderTasks();
    });

    document.getElementById('toggleTaskStatsSecondaryBtn').addEventListener('click', () => {
      showSecondaryStats = !showSecondaryStats;
      saveSecondaryStatsPreference();
      updateSecondaryStatsToggle();
    });

    document.getElementById('taskStatsSecondary').addEventListener('click', e => {
      const statsTabId = e.target.closest('[data-stats-tab]')?.dataset.statsTab;
      if (!statsTabId || statsTabId === activeSecondaryStatsTab) return;
      activeSecondaryStatsTab = statsTabId;
      renderStats();
    });

    // ── Modal Open/Close ──
    // Wire up header buttons and backdrop clicks to open/close each modal.
    document.getElementById('newTaskBtn').addEventListener('click', () => openModal());
    document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
    document.getElementById('manageCategoriesBtn').addEventListener('click', () => openCategoryModal());
    document.getElementById('manageTemplatesBtn').addEventListener('click', () => openTemplateModal());
    document.getElementById('clearCompletedBtn').addEventListener('click', () => {
      const completedCount = tasks.filter(task => isTaskCompleted(task)).length;
      if (!completedCount) return;
      if (confirm(`Permanently delete ${completedCount} completed task${completedCount === 1 ? '' : 's'} and their logs?`)) {
        clearCompletedTasks();
      }
    });
    document.getElementById('exportExcelBtn').addEventListener('click', exportToExcel);
    document.getElementById('cancelTaskBtn').addEventListener('click', closeModal);
    document.getElementById('cancelCategoryBtn').addEventListener('click', closeCategoryModal);
    document.getElementById('cancelTemplateBtn').addEventListener('click', closeTemplateModal);

    bindBackdropDismiss('taskModal', closeModal);
    bindBackdropDismiss('categoryModal', closeCategoryModal);
    bindBackdropDismiss('templateModal', closeTemplateModal);

    document.getElementById('categoryList').addEventListener('click', e => {
      const moveName = e.target.closest('[data-move-category]')?.dataset.moveCategory;
      const moveDirection = e.target.closest('[data-move-direction]')?.dataset.moveDirection;
      const editName = e.target.closest('[data-edit-category]')?.dataset.editCategory;
      const deleteName = e.target.closest('[data-delete-category]')?.dataset.deleteCategory;

      if (moveName) {
        if (!moveDirection) return;
        if (!moveCategory(moveName, moveDirection)) return;
        saveCategories();
        renderCategoryList();
        renderTasks();
        return;
      }

      if (editName) {
        const category = getCategoryByName(editName);
        if (!category) return;
        editingCategoryName = category.name;
        document.getElementById('categoryName').value = category.name;
        document.getElementById('categoryColor').value = category.color;
        syncCategoryColorPresets(category.color);
        document.getElementById('submitCategoryBtn').textContent = 'Update Category';
        document.getElementById('categoryName').disabled = isProtectedCategory(category.name);
        document.getElementById('categoryName').focus();
        return;
      }

      if (deleteName) {
        if (isProtectedCategory(deleteName)) return;
        if (confirm(`Delete category "${deleteName}"? Tasks in it will move to General.`)) {
          categories = categories.filter(category => category.name !== deleteName);
          tasks = tasks.map(task => task.category === deleteName ? { ...task, category: 'General' } : task);
          if (document.getElementById('filterCategory').value === deleteName) {
            document.getElementById('filterCategory').value = '';
          }
          saveCategories();
          saveTasks();
          renderCategoryList();
          renderTasks();
        }
      }
    });

    document.getElementById('templateList').addEventListener('click', e => {
      const editTemplateId = e.target.closest('[data-edit-template]')?.dataset.editTemplate;
      const deleteTemplateId = e.target.closest('[data-delete-template]')?.dataset.deleteTemplate;

      if (editTemplateId) {
        const template = getTemplateById(editTemplateId);
        if (!template) return;
        editingTemplateId = template.id;
        document.getElementById('templateName').value = template.name;
        document.getElementById('templateSubtasks').value = template.subtasks.join('\n');
        document.getElementById('submitTemplateBtn').textContent = 'Update Template';
        document.getElementById('templateName').focus();
        return;
      }

      if (deleteTemplateId) {
        const template = getTemplateById(deleteTemplateId);
        if (!template) return;
        if (confirm(`Delete template "${template.name}"? Existing tasks will keep their current subtasks.`)) {
          templates = templates.filter(item => item.id !== deleteTemplateId);
          saveTemplates();
          renderTemplateList();
          renderTasks();
        }
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeDetailContextMenu();
        closeModal();
        closeCategoryModal();
        closeTemplateModal();
      }
    });

    document.addEventListener('click', e => {
      if (e.target.closest('#detailContextMenu')) return;
      closeDetailContextMenu();
    });

    window.addEventListener('resize', closeDetailContextMenu);
    document.addEventListener('scroll', closeDetailContextMenu, true);

    function openCategoryModal() {
      document.getElementById('categoryModal').classList.add('open');
      renderCategoryList();
      syncCategoryColorPresets(document.getElementById('categoryColor').value || '#5b8def');
      document.getElementById('categoryName').focus();
    }

    function closeCategoryModal() {
      document.getElementById('categoryModal').classList.remove('open');
      editingCategoryName = null;
      document.getElementById('categoryForm').reset();
      document.getElementById('categoryName').disabled = false;
      document.getElementById('categoryColor').value = '#5b8def';
      syncCategoryColorPresets('#5b8def');
      document.getElementById('submitCategoryBtn').textContent = 'Save Category';
    }

    function openTemplateModal() {
      document.getElementById('templateModal').classList.add('open');
      renderTemplateList();
      document.getElementById('templateName').focus();
    }

    function closeTemplateModal() {
      document.getElementById('templateModal').classList.remove('open');
      editingTemplateId = null;
      document.getElementById('templateForm').reset();
      document.getElementById('submitTemplateBtn').textContent = 'Save Template';
    }

    // ── Init ──
    loadState();
    applyTheme(currentTheme);
    saveCategories();
    saveTasks();
    saveTemplates();
    ensureSelectedTask();
    document.getElementById('toggleDoneBtn').textContent = hideDone ? 'Show Completed' : 'Hide Completed';
    renderCategoryList();
    renderTemplateList();
    renderTasks();
    updateSecondaryStatsToggle();
    applyInputLimits();
  </script>
</body>
</html>
