<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <!-- Pre-paint theme bootstrap: reads saved preference and sets the class on <html>
       before the stylesheet loads, preventing a flash of the wrong theme. -->
  <script>
    (() => {
      const themeKey = 'tm_theme';
      const savedTheme = localStorage.getItem(themeKey);
      const preferredTheme = savedTheme === 'light' || savedTheme === 'dark'
        ? savedTheme
        : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');

      document.documentElement.classList.add(`theme-${preferredTheme}`);
      document.documentElement.dataset.theme = preferredTheme;
    })();
    </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap');

    /* ── Reset & Base ──
       Removes default margins/padding and sets the CSS custom-property colour
       tokens used everywhere. Dark-mode values live in :root; light-mode
       overrides are in :root.theme-light below. ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1622;
      --surface:   #182130;
      --surface2:  #202c3f;
      --surface3:  #27354c;
      --panel-bg:  rgba(24, 33, 48, .9);
      --panel-alt: rgba(32, 44, 63, .94);
      --field-bg:  rgba(10, 16, 27, .72);
      --field-bg-strong: rgba(14, 21, 34, .84);
      --border:    #324157;
      --border-strong:#465a77;
      --text:      #edf3fb;
      --text-muted:#9aa8be;
      --accent:    #5b7dff;
      --accent-h:  #84a2ff;
      --accent-soft: rgba(91,125,255,.16);
      --accent-soft-strong: rgba(91,125,255,.24);
      --success-soft: rgba(34,197,94,.16);
      --warning-soft: rgba(245,158,11,.16);
      --danger-soft: rgba(239,68,68,.16);
      --ongoing-soft: rgba(99,102,241,.16);
      --focus-ring: rgba(91,125,255,.22);
      --bg-glow-1: rgba(91,125,255,.16);
      --bg-glow-2: rgba(34,197,94,.1);
      --bg-glow-3: rgba(245,158,11,.08);
      --shadow-soft: 0 12px 30px rgba(2, 6, 23, .24);
      --shadow-panel: 0 22px 48px rgba(2, 6, 23, .34);

      --critical: #dc2626;
      --high:   #f97316;
      --medium: #f59e0b;
      --low:    #22c55e;
      --very-low: #38bdf8;

      --status-not-started: #94a3b8;
      --status-pending: #f59e0b;
      --status-waiting: #f97316;
      --status-ongoing: #3b82f6;
      --status-done:    #475569;

      --sticky-panel-top: 82px;
      --sticky-panel-gap: 16px;
      --task-list-offset: 270px;
      --workspace-height-offset: 170px;
    }

    :root.theme-light {
      --bg:        #ecf2f8;
      --surface:   #f8fbff;
      --surface2:  #edf3fb;
      --surface3:  #dce7f5;
      --panel-bg:  rgba(248, 251, 255, .92);
      --panel-alt: rgba(237, 243, 251, .96);
      --field-bg:  rgba(231, 239, 249, .88);
      --field-bg-strong: rgba(223, 233, 245, .94);
      --border:    #cedaed;
      --border-strong:#aebfd7;
      --text:      #162235;
      --text-muted:#5c6f88;
      --accent:    #2f63e0;
      --accent-h:  #4f7beb;
      --accent-soft: rgba(47,99,224,.12);
      --accent-soft-strong: rgba(47,99,224,.18);
      --success-soft: rgba(31,140,90,.14);
      --warning-soft: rgba(199,132,19,.14);
      --danger-soft: rgba(217,79,79,.14);
      --ongoing-soft: rgba(47,99,224,.13);
      --focus-ring: rgba(47,99,224,.16);
      --bg-glow-1: rgba(47,99,224,.1);
      --bg-glow-2: rgba(31,140,90,.07);
      --bg-glow-3: rgba(199,132,19,.06);
      --shadow-soft: 0 10px 24px rgba(31, 45, 61, .08);
      --shadow-panel: 0 24px 48px rgba(31, 45, 61, .12);
      --critical: #b91c1c;
      --high: #c2410c;
      --medium: #c78413;
      --low: #1f8c5a;
      --very-low: #1f7ea7;
      --status-not-started: #5e7088;
      --status-pending: #c78413;
      --status-waiting: #c2410c;
      --status-ongoing: #2f63e0;
      --status-done: #66768a;
    }

    body {
      background:
        radial-gradient(circle at top left, var(--bg-glow-1), transparent 28%),
        radial-gradient(circle at top right, var(--bg-glow-2), transparent 24%),
        radial-gradient(circle at bottom center, var(--bg-glow-3), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: 'Manrope', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Layout ──
       Top-level structure: sticky header, two-column workspace grid
       (list panel left, detail panel right). ── */
    .app-header {
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 7%, var(--panel-bg)), var(--panel-bg));
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 14%, var(--border));
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 24px rgba(2, 6, 23, .12);
    }

    .app-header-main {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .app-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .02em;
      color: color-mix(in srgb, var(--text) 88%, var(--accent-h) 12%);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .app-header h1 span { color: var(--accent); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex: 0 0 auto;
    }

    .main-content {
      max-width: none;
      margin: 0 auto;
      padding: 16px 12px;
    }

    .filters-strip {
      position: sticky;
      top: calc(var(--sticky-panel-top) - 10px);
      z-index: 9;
      padding: 10px 12px 0;
      background: linear-gradient(180deg, color-mix(in srgb, var(--bg) 92%, transparent), transparent 88%);
      backdrop-filter: blur(10px);
    }

    .workspace-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(460px, 1.15fr);
      gap: 12px;
      align-items: start;
      height: calc(100vh - var(--workspace-height-offset));
      height: calc(100dvh - var(--workspace-height-offset));
      min-height: 0;
      overflow: hidden;
    }

    .list-panel,
    .detail-panel {
      min-width: 0;
      min-height: 0;
      height: 100%;
    }

    .list-panel {
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 5%, var(--panel-bg)), rgba(0,0,0,0));
      border: 1px solid color-mix(in srgb, var(--accent) 8%, var(--border));
      border-radius: 20px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: var(--sticky-panel-top);
      align-self: start;
      box-shadow: var(--shadow-panel);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    /* ── Buttons ──
       Base .btn class plus variants: btn-primary (accent fill),
       btn-ghost (transparent with border), btn-danger (red text, red border). ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      min-height: 40px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      white-space: nowrap;
      transition: transform .12s ease, color .12s ease, background-color .12s ease, border-color .12s ease, box-shadow .12s ease;
    }

    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    .btn-primary {
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent-h) 26%, var(--accent)), var(--accent));
      color: #fff;
      box-shadow: none;
    }
    .btn-primary:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015));
      color: color-mix(in srgb, var(--text-muted) 78%, var(--text) 22%);
      border: 1px solid color-mix(in srgb, var(--accent) 8%, var(--border));
    }
    .btn-ghost:hover {
      background: color-mix(in srgb, var(--accent) 10%, var(--surface2));
      color: var(--text);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: linear-gradient(180deg, color-mix(in srgb, var(--high) 9%, transparent), transparent);
      color: var(--high);
      border: 1px solid color-mix(in srgb, var(--high) 22%, transparent);
      padding: 4px 8px;
      font-size: 12px;
    }
    .btn-danger:hover {
      border-color: color-mix(in srgb, var(--high) 42%, transparent);
      background: color-mix(in srgb, var(--high) 14%, transparent);
    }

    .btn-header {
      --header-btn-color: var(--accent);
      --header-btn-text: color-mix(in srgb, var(--text) 76%, var(--header-btn-color) 24%);
      background: color-mix(in srgb, var(--header-btn-color) 12%, var(--surface2));
      color: var(--header-btn-text);
      border: 1px solid color-mix(in srgb, var(--header-btn-color) 28%, var(--border));
    }

    .btn-header svg {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
    }

    .btn-header-label {
      display: inline-flex;
      align-items: center;
      min-width: 0;
    }

    .btn-header:hover {
      background: color-mix(in srgb, var(--header-btn-color) 17%, var(--surface3));
      color: color-mix(in srgb, var(--text) 84%, var(--header-btn-color) 16%);
      border-color: color-mix(in srgb, var(--header-btn-color) 40%, var(--border-strong));
    }

    .btn-header-theme { --header-btn-color: #6d7cff; }

    .btn-header-categories { --header-btn-color: #06b6d4; }

    .btn-header-templates { --header-btn-color: #f59e0b; }

    .btn-header-clear { --header-btn-color: #ef4444; }

    .btn-header-export { --header-btn-color: #22c55e; }

    .btn-header-new {
      --header-btn-color: #ec4899;
      --header-btn-text: color-mix(in srgb, var(--text) 72%, #ffd4ea 28%);
    }

    /* ── Modal ──
       Full-screen backdrop that shows/hides via .open class.
       Centred .modal container holds the form content. ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(6,10,18,.64);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }
    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 5%, var(--surface)), var(--surface));
      border: 1px solid color-mix(in srgb, var(--accent) 10%, var(--border));
      border-radius: 18px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-panel);
    }

    #taskModal .modal {
      max-width: 760px;
    }

    #categoryModal .modal {
      max-width: 620px;
    }

    #taskForm .form-row:first-of-type {
      grid-template-columns: 1.2fr .85fr .85fr;
    }

    .modal h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 18px;
      color: color-mix(in srgb, var(--text) 86%, var(--accent-h) 14%);
    }

    /* ── Form ──
       .form-group wraps a label + input/select/textarea pair.
       .form-row puts multiple groups side-by-side in a grid. ── */
    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: color-mix(in srgb, var(--text-muted) 74%, var(--accent) 26%);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: linear-gradient(180deg, var(--field-bg-strong), var(--field-bg));
      border: 1px solid color-mix(in srgb, var(--accent) 8%, var(--border));
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
      transition: border-color .15s, box-shadow .15s, background-color .15s;
    }

    .form-group select {
      cursor: pointer;
      color-scheme: dark;
    }

    :root.theme-light .form-group select {
      color-scheme: light;
    }

    .form-group select option {
      background: var(--surface);
      color: var(--text);
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring), inset 0 1px 0 rgba(255,255,255,.03);
    }

    .form-group textarea {
      resize: none;
      min-height: 70px;
      overflow-y: auto;
    }

    #templateSubtasks {
      min-height: 140px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }

    .category-form-actions {
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .category-color-presets {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .category-color-presets-label {
      font-size: 10px;
      font-weight: 700;
      color: color-mix(in srgb, var(--text-muted) 70%, var(--accent) 30%);
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }

    .category-color-preset {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 2px solid color-mix(in srgb, var(--preset-color, var(--accent)) 28%, var(--border));
      background: var(--preset-color, var(--accent));
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
    }

    .category-color-preset:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--preset-color, var(--accent)) 58%, white 12%);
    }

    .category-color-preset.is-active {
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--preset-color, var(--accent)) 22%, transparent);
      border-color: color-mix(in srgb, var(--preset-color, var(--accent)) 72%, white 10%);
    }

    .category-form-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .input-counter {
      margin-top: 5px;
      font-size: 11px;
      line-height: 1.2;
      color: var(--text-muted);
      text-align: right;
    }

    .input-counter-wrap {
      display: grid;
      gap: 0;
      min-width: 0;
      width: 100%;
    }

    .input-counter-wrap > input,
    .input-counter-wrap > textarea,
    .input-counter-wrap > select {
      width: 100%;
    }

    .input-counter.is-near-limit {
      color: var(--medium);
    }

    .input-counter.is-at-limit {
      color: var(--high);
    }

    /* ── Filters Bar ──
       Horizontal bar above the task list with search, category/priority/status
       dropdowns, a sort picker, and the Hide Completed toggle. ── */
    .filters-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      overflow: visible;
      margin-bottom: 0;
      padding: 8px 10px;
      border: 1px solid color-mix(in srgb, var(--accent) 10%, var(--border));
      border-radius: 14px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 4%, transparent), rgba(255,255,255,.02));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
      min-height: 56px;
    }

    .filter-label {
      font-size: 11px;
      color: color-mix(in srgb, var(--text-muted) 70%, var(--accent) 30%);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      flex: 0 0 auto;
    }

    .filters-bar select,
    .search-input {
      background: linear-gradient(180deg, var(--field-bg-strong), var(--field-bg));
      border: 1px solid color-mix(in srgb, var(--accent) 8%, var(--border));
      border-radius: 10px;
      padding: 0 12px;
      min-height: 36px;
      color: var(--text);
      font-size: 12px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
      min-width: 0;
    }

    .filters-bar select {
      flex: 0 1 150px;
    }

    .filters-bar select,
    .status-select,
    .priority-select,
    .sort-select {
      color-scheme: dark;
    }

    :root.theme-light .filters-bar select,
    :root.theme-light .status-select,
    :root.theme-light .priority-select,
    :root.theme-light .sort-select {
      color-scheme: light;
    }

    .filters-bar select option,
    .status-select option,
    .priority-select option,
    .sort-select option {
      background: var(--surface);
      color: var(--text);
    }

    .filters-bar select { cursor: pointer; }

    .filters-bar select:focus,
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring), inset 0 1px 0 rgba(255,255,255,.03);
    }

    .search-input {
      min-width: 220px;
      flex: 1 1 320px;
    }

    .toggle-done-btn {
      margin-left: auto;
      flex: 0 0 auto;
    }

    /* ── Task Stats ──
       Primary row: 4 large stat chips (Total, Ongoing, Done, Critical/High).
       Secondary grid: micro-stats for every status, priority, and category. ── */
    .task-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 10px;
      flex: 0 0 auto;
    }

    .task-stats-header {
      flex: 1 1 auto;
      min-width: 0;
      max-width: 620px;
      margin-bottom: 0;
      gap: 8px;
      align-items: stretch;
    }

    .task-stats-secondary {
      display: grid;
      gap: 10px;
      margin-bottom: 0;
      transition: opacity .18s ease, transform .18s ease;
    }

    .task-stats-secondary-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
      align-items: stretch;
      padding: 0 0 8px;
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 12%, var(--border));
    }

    .task-stats-secondary-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 7px 12px;
      border-radius: 12px;
      border: 1px solid color-mix(in srgb, var(--accent) 8%, var(--border));
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface2) 88%, transparent), color-mix(in srgb, var(--surface) 94%, transparent));
      color: color-mix(in srgb, var(--text-muted) 80%, var(--text) 20%);
      font-size: 10px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: .04em;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
      transition: border-color .12s ease, background-color .12s ease, color .12s ease, box-shadow .12s ease;
    }

    .task-stats-secondary-tab:hover {
      border-color: color-mix(in srgb, var(--accent) 18%, var(--border));
      color: var(--text);
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface3) 52%, transparent), color-mix(in srgb, var(--surface) 96%, transparent));
    }

    .task-stats-secondary-tab.is-active {
      background: linear-gradient(180deg, color-mix(in srgb, var(--tab-accent, var(--accent)) 11%, var(--panel-bg)), color-mix(in srgb, var(--tab-accent, var(--accent)) 4%, var(--panel-bg)));
      border-color: color-mix(in srgb, var(--tab-accent, var(--accent)) 28%, var(--border));
      color: color-mix(in srgb, var(--text) 84%, var(--tab-accent, var(--accent)) 16%);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--tab-accent, var(--accent)) 10%, transparent), 0 10px 22px rgba(2, 6, 23, .10);
    }

    .task-stats-secondary-tab.is-active span:first-child {
      position: relative;
    }

    .task-stats-secondary-tab.is-active span:first-child::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: -8px;
      height: 3px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--tab-accent, var(--accent)) 78%, white 22%);
    }

    .task-stats-secondary-shell {
      margin-bottom: 14px;
      padding: 10px;
      border: 1px solid color-mix(in srgb, var(--accent) 12%, var(--border));
      border-radius: 16px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 5%, transparent), rgba(255,255,255,.02));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }

    .task-stats-secondary-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .task-stats-secondary-shell.is-collapsed .task-stats-secondary {
      display: none;
    }

    .task-stats-secondary-toggle {
      min-height: 30px;
      padding: 5px 10px;
      font-size: 11px;
    }

    .stats-group {
      display: none;
      gap: 8px;
      min-width: 0;
      padding: 10px;
      border: 1px solid color-mix(in srgb, var(--group-accent, var(--accent)) 14%, var(--border));
      border-radius: 14px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--group-accent, var(--accent)) 8%, var(--panel-alt)), var(--panel-bg));
      box-shadow: var(--shadow-soft);
    }

    .stats-group.is-active {
      display: grid;
    }

    .stats-group-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .stats-group-title {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--text-muted) 62%, var(--group-accent, var(--accent)) 38%);
    }

    .stats-group-total {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .stats-group-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
      gap: 6px;
      min-width: 0;
    }

    .stat-chip {
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 6px;
      min-height: 84px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--chip-accent, var(--accent)) 9%, var(--panel-alt)), var(--panel-bg));
      border: 1px solid color-mix(in srgb, var(--chip-accent, var(--accent)) 14%, var(--border));
      border-radius: 16px;
      padding: 12px;
      font-size: 12px;
      color: var(--text-muted);
      box-shadow: var(--shadow-soft);
    }

    .stat-chip::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 48px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--chip-accent, var(--accent)) 12%, transparent), transparent);
      pointer-events: none;
    }

    .stat-chip::after {
      content: '';
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 0;
      height: 3px;
      border-radius: 999px;
      background: var(--chip-accent, var(--accent));
      opacity: .9;
    }

    .stat-label {
      font-size: 11px;
      color: color-mix(in srgb, var(--text-muted) 74%, var(--chip-accent, var(--accent)) 26%);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
    }

    .stat-value {
      display: block;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.04em;
      color: var(--text);
    }

    .stat-hint {
      font-size: 11px;
      color: var(--text-muted);
    }

    .task-stats-header .stat-chip {
      min-height: 0;
      padding: 8px 10px 9px;
      border-radius: 14px;
      gap: 3px;
    }

    .task-stats-header .stat-chip::before {
      height: 34px;
    }

    .task-stats-header .stat-chip::after {
      left: 10px;
      right: 10px;
      height: 2px;
    }

    .task-stats-header .stat-label {
      font-size: 9px;
      letter-spacing: .07em;
    }

    .task-stats-header .stat-value {
      font-size: 20px;
      line-height: 1.05;
    }

    .task-stats-header .stat-hint {
      display: none;
    }

    .micro-stat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid color-mix(in srgb, var(--micro-accent, var(--group-accent, var(--accent))) 26%, transparent);
      border-radius: 999px;
      padding: 5px 8px 5px 10px;
      background: color-mix(in srgb, var(--micro-accent, var(--group-accent, var(--accent))) 16%, transparent);
      min-height: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }

    .micro-stat-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      line-height: 1.2;
      color: color-mix(in srgb, var(--text-muted) 42%, var(--micro-accent, var(--group-accent, var(--accent))) 58%);
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .micro-stat.is-category .micro-stat-label::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--micro-accent, var(--group-accent, var(--accent)));
      box-shadow: 0 0 0 1px rgba(255,255,255,.08);
      flex: 0 0 auto;
    }

    .micro-stat-value {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      padding: 2px 7px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--micro-accent, var(--group-accent, var(--accent))) 22%, transparent);
      border: 1px solid color-mix(in srgb, var(--micro-accent, var(--group-accent, var(--accent))) 28%, transparent);
      font-size: 11px;
      font-weight: 800;
      color: color-mix(in srgb, var(--text) 12%, var(--micro-accent, var(--group-accent, var(--accent))) 88%);
    }

    /* ── Task List ──
       Scrollable column of task cards. Max-height is calculated from viewport
       so it never grows taller than the visible area. ── */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      flex: 1 1 auto;
      max-height: none;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 10px;
      padding-bottom: 4px;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: rgba(129,140,248,.28) transparent;
    }

    .task-list::-webkit-scrollbar {
      width: 10px;
    }

    .task-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .task-list::-webkit-scrollbar-thumb {
      background: rgba(129,140,248,.22);
      border: 2px solid transparent;
      border-radius: 999px;
      background-clip: padding-box;
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 360px;
      text-align: center;
      padding: 36px 20px;
      color: var(--text-muted);
      border: 1px dashed rgba(129,140,248,.18);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
    }

    .empty-state svg {
      opacity: .95;
      margin-bottom: 14px;
      width: 72px;
      height: 72px;
      padding: 16px;
      border-radius: 22px;
      border: 1px solid rgba(129,140,248,.2);
      background: rgba(99,102,241,.08);
    }

    .empty-state p {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .empty-state small {
      font-size: 13px;
      max-width: 34ch;
      line-height: 1.55;
    }

    /* ── Task Card ──
       Each task is a card with a coloured left border (priority colour) and a
       subtle category-colour glow overlay. The body is a two-column grid:
       task-main (content) on the left, task-actions (controls) on the right. ── */
    .task-card {
      background: linear-gradient(180deg, rgba(255,255,255,.025), var(--surface));
      border: 1px solid color-mix(in srgb, var(--accent) 8%, var(--border));
      border-left: 3px solid var(--border);
      border-radius: 14px;
      display: block;
      flex: 0 0 auto;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease, background-color .12s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(2, 6, 23, .08), inset 0 1px 0 rgba(255,255,255,.02);
    }

    .task-card-body {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 260px);
      gap: 10px;
      padding: 12px 13px;
      align-items: start;
    }

    .task-card::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 100%;
      pointer-events: none;
      background: linear-gradient(90deg, color-mix(in srgb, var(--category-color, transparent) 16%, transparent), transparent 58%);
      opacity: .9;
    }

    .task-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent), 0 14px 28px rgba(2, 6, 23, .12);
    }

    .task-card.is-active {
      border-color: color-mix(in srgb, var(--accent-h) 74%, white 10%);
      border-left-width: 7px;
      outline: 2px solid color-mix(in srgb, var(--accent-h) 72%, white 8%);
      outline-offset: -2px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 24%, var(--surface2)), color-mix(in srgb, var(--accent) 10%, var(--surface)));
    }

    .task-card.is-active::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 11px;
      border: 1px solid color-mix(in srgb, var(--accent-h) 58%, var(--accent) 42%);
      pointer-events: none;
    }

    .task-card.is-active .task-title {
      color: color-mix(in srgb, var(--text) 72%, var(--accent-h) 28%);
    }

    .task-card.priority-critical { border-left-color: var(--critical); }
    .task-card.priority-high   { border-left-color: var(--high); }
    .task-card.priority-medium { border-left-color: var(--medium); }
    .task-card.priority-low    { border-left-color: var(--low); }
    .task-card.priority-very-low { border-left-color: var(--very-low); }

    .task-card.status-done {
      opacity: .55;
    }

    .task-card.status-done .task-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-main {
      min-width: 0;
      grid-column: 1;
      display: grid;
      gap: 5px;
      align-content: start;
      padding-right: 4px;
    }

    .task-heading {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      min-width: 0;
    }

    .task-heading-main {
      width: 100%;
      min-width: 0;
      flex: 1 1 auto;
      display: grid;
      gap: 4px;
    }

    .task-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 2px;
      color: color-mix(in srgb, var(--text) 88%, var(--accent-h) 12%);
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
      line-clamp: 2;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .task-email-subject,
    .task-summary {
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.35;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .task-email-subject {
      color: color-mix(in srgb, var(--text-muted) 68%, var(--accent-h) 32%);
    }

    .task-email-subject,
    .task-summary,
    .task-log-preview {
      line-clamp: 1;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 1;
      overflow: hidden;
    }

    .task-log-preview {
      padding: 4px 7px;
      border: 1px solid color-mix(in srgb, var(--accent) 34%, var(--border));
      border-left: 2px solid var(--accent);
      border-radius: 7px;
      background: linear-gradient(90deg, rgba(79,124,255,.12), rgba(255,255,255,.02));
      color: color-mix(in srgb, var(--text-muted) 68%, var(--accent-h) 32%);
    }

    .quick-toggle {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--accent) 10%, var(--border-strong));
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      color: var(--text-muted);
      cursor: pointer;
      transition: color .12s ease, border-color .12s ease, background-color .12s ease;
      flex: 0 0 auto;
    }

    .quick-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
    }

    .quick-toggle.is-done {
      border-color: var(--low);
      color: var(--low);
      background: rgba(34,197,94,.10);
    }

    .task-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
      flex: 1 1 220px;
    }

    .task-info-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 700;
      border: 1px solid transparent;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    .badge-critical { background: color-mix(in srgb, var(--critical) 16%, transparent); color: var(--critical); border-color: color-mix(in srgb, var(--critical) 28%, transparent); }
    .badge-high     { background: color-mix(in srgb, var(--high) 15%, transparent); color: var(--high); border-color: color-mix(in srgb, var(--high) 26%, transparent); }
    .badge-medium   { background: color-mix(in srgb, var(--medium) 15%, transparent); color: var(--medium); border-color: color-mix(in srgb, var(--medium) 26%, transparent); }
    .badge-low      { background: color-mix(in srgb, var(--low) 14%, transparent); color: var(--low); border-color: color-mix(in srgb, var(--low) 24%, transparent); }
    .badge-very-low { background: color-mix(in srgb, var(--very-low) 15%, transparent); color: var(--very-low); border-color: color-mix(in srgb, var(--very-low) 26%, transparent); }

    .badge-pending { background: color-mix(in srgb, var(--status-pending) 15%, transparent); color: var(--status-pending); border-color: color-mix(in srgb, var(--status-pending) 28%, transparent); }
    .badge-not-started { background: color-mix(in srgb, var(--status-not-started) 12%, transparent); color: var(--status-not-started); border-color: color-mix(in srgb, var(--status-not-started) 22%, transparent); }
    .badge-ongoing { background: color-mix(in srgb, var(--status-ongoing) 15%, transparent); color: var(--status-ongoing); border-color: color-mix(in srgb, var(--status-ongoing) 24%, transparent); }
    .badge-waiting-for-someone-else { background: color-mix(in srgb, var(--status-waiting) 15%, transparent); color: var(--status-waiting); border-color: color-mix(in srgb, var(--status-waiting) 28%, transparent); }
    .badge-done    { background: color-mix(in srgb, var(--status-done) 18%, transparent); color: #94a3b8; border-color: color-mix(in srgb, var(--status-done) 28%, transparent); }

    .badge-category {
      color: var(--category-color, var(--text));
      background: color-mix(in srgb, var(--category-color, var(--accent)) 18%, transparent);
      border-color: color-mix(in srgb, var(--category-color, var(--accent)) 55%, transparent);
    }

    .category-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--category-color, var(--accent));
      box-shadow: 0 0 0 1px rgba(255,255,255,.08);
      flex-shrink: 0;
    }

    .task-date {
      font-size: 10px;
      color: var(--text-muted);
    }

    .task-date.overdue { color: var(--high); }

    .task-actions {
      display: grid;
      grid-column: 2;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: start;
      gap: 5px;
      width: 100%;
      justify-self: end;
      min-width: 0;
    }

    .task-action-item {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .task-action-item.is-wide {
      grid-column: 1 / -1;
    }

    .task-action-label {
      font-size: 9px;
      line-height: 1.1;
      color: color-mix(in srgb, var(--text-muted) 74%, var(--accent) 26%);
      text-transform: uppercase;
      letter-spacing: .06em;
      text-align: left;
      padding-left: 2px;
    }

    .task-actions .btn,
    .task-actions .status-select,
    .task-actions .priority-select {
      width: 100%;
    }

    .task-actions .btn {
      min-height: 28px;
      padding: 4px 8px;
      font-size: 10px;
    }

    .task-actions .btn-danger {
      border-color: var(--high);
    }

    .status-select,
    .priority-select,
    .sort-select {
      background: linear-gradient(180deg, var(--field-bg-strong), var(--field-bg));
      border: 1px solid color-mix(in srgb, var(--accent) 8%, var(--border));
      border-radius: 8px;
      padding: 4px 6px;
      min-height: 30px;
      min-width: 0;
      max-width: 100%;
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      outline: none;
    }

    .status-select:focus,
    .priority-select:focus,
    .sort-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    .task-preview-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      align-items: start;
      min-width: 0;
      flex: 0 1 auto;
    }

    .task-preview-main {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .task-preview-dates {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(84px, 1fr));
      gap: 3px;
      justify-items: stretch;
      justify-self: end;
      align-content: start;
      min-width: 0;
      max-width: 500px;
      width: 100%;
    }

    .task-preview-date {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 3px;
      padding: 4px 7px;
      border-radius: 8px;
      border: 1px solid color-mix(in srgb, var(--accent) 8%, var(--border));
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      text-align: left;
      min-width: 0;
    }

    .task-preview-date-label {
      font-size: 8px;
      line-height: 1.1;
      color: color-mix(in srgb, var(--text-muted) 76%, var(--accent) 24%);
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }

    .task-preview-date-value {
      font-size: 9px;
      line-height: 1.2;
      font-weight: 600;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    .task-description-block {
      font-size: 11px;
      line-height: 1.45;
      color: color-mix(in srgb, var(--text-muted) 82%, var(--text) 18%);
      margin-top: 2px;
      padding-top: 6px;
      border-top: 1px solid color-mix(in srgb, var(--accent) 10%, var(--border));
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
      line-clamp: 2;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .task-description-block.is-empty {
      color: color-mix(in srgb, var(--text-muted) 88%, transparent);
      font-style: italic;
    }

    .task-preview-date.is-due {
      border-color: color-mix(in srgb, var(--medium) 45%, var(--border));
      background: linear-gradient(180deg, rgba(245,158,11,.11), rgba(255,255,255,.025));
    }

    .task-preview-date.is-due .task-preview-date-value {
      color: var(--medium);
    }

    .task-preview-date.is-due.overdue {
      border-color: color-mix(in srgb, var(--high) 60%, var(--border));
      background: linear-gradient(180deg, rgba(239,68,68,.14), rgba(255,255,255,.025));
    }

    .task-preview-date.is-due.overdue .task-preview-date-value {
      color: var(--high);
    }

    .task-preview-date.is-received {
      border-color: color-mix(in srgb, var(--accent) 40%, var(--border));
      background: linear-gradient(180deg, rgba(79,124,255,.11), rgba(255,255,255,.025));
    }

    .task-preview-date.is-received .task-preview-date-value {
      color: var(--accent-h);
    }

    .task-preview-date.is-created {
      border-color: color-mix(in srgb, var(--text-muted) 34%, var(--border));
      background: linear-gradient(180deg, rgba(148,163,184,.08), rgba(255,255,255,.02));
    }

    .task-preview-date.is-created .task-preview-date-value {
      color: color-mix(in srgb, var(--text) 84%, var(--text-muted) 16%);
    }

    .detail-panel {
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent) 8%, transparent), transparent 22%),
        var(--panel-bg);
      border: 1px solid color-mix(in srgb, var(--accent) 16%, var(--border));
      border-radius: 18px;
      padding: 18px;
      position: sticky;
      top: var(--sticky-panel-top);
      backdrop-filter: blur(12px);
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: rgba(129,140,248,.28) transparent;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.025),
        var(--shadow-panel);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .detail-panel::-webkit-scrollbar {
      width: 10px;
    }

    .detail-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .detail-panel::-webkit-scrollbar-thumb {
      background: rgba(129,140,248,.22);
      border: 2px solid transparent;
      border-radius: 999px;
      background-clip: padding-box;
    }

    .detail-empty {
      min-height: 320px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--text-muted);
      padding: 24px;
      border: 1px dashed color-mix(in srgb, var(--accent) 18%, var(--border));
      border-radius: 10px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 5%, transparent), rgba(255,255,255,0));
    }

    .detail-empty svg {
      width: 72px;
      height: 72px;
      padding: 16px;
      margin-bottom: 14px;
      border-radius: 22px;
      border: 1px solid rgba(52,195,143,.2);
      background: rgba(52,195,143,.08);
    }

    .detail-empty p {
      font-size: 20px;
      font-weight: 700;

      min-width: 34px;
    }

    .category-move-btn {
      min-height: 30px;
      padding: 4px 8px;
      font-size: 14px;
      line-height: 1;
      font-weight: 800;
      justify-content: center;
    }

    .category-item-actions .btn {
      min-height: 30px;
      padding: 4px 10px;
      font-size: 10px;
      width: 100%;
    }

    .color-input {
      width: 100%;
      min-width: 56px;
      height: 42px;
      padding: 4px;
      border-radius: 10px;
      border: 1px solid color-mix(in srgb, var(--accent) 10%, var(--border));
      background: linear-gradient(180deg, var(--field-bg-strong), var(--field-bg));
      cursor: pointer;
    }

    .template-list {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .template-item {
      padding: 14px;
      border: 1px solid color-mix(in srgb, var(--accent) 8%, var(--border));
      border-radius: 14px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 4%, var(--surface2)), var(--surface2));
      display: grid;
      gap: 12px;
    }

    .template-item-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 12px;
    }

    .template-item-summary {
      min-width: 0;
    }

    .template-item-name {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      color: color-mix(in srgb, var(--text) 88%, var(--accent-h) 12%);
    }

    .template-subtask-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--text-muted);
      font-size: 11px;
    }

    .template-subtask-preview span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--accent) 12%, var(--border));
      background: color-mix(in srgb, var(--accent) 8%, var(--surface));
      color: color-mix(in srgb, var(--text-muted) 80%, var(--text) 20%);
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .template-item .task-actions {
      width: auto;
      min-width: 132px;
      align-self: start;
    }

    .template-item .task-actions .btn {
      min-height: 30px;
    }

    .template-item .btn-danger {
      padding: 4px 10px;
      font-size: 10px;
    }

    @media (max-width: 540px) {
      .template-item-header {
        grid-template-columns: 1fr;
      }

      .template-item .task-actions {
        width: 100%;
        min-width: 0;
      }
    }

    .subtasks-section {
      --section-accent: var(--medium);
    }

    .subtask-list {
      display: grid;
      gap: 6px;
    }

    .subtask-list-shell {
      flex: 1 1 auto;
      min-height: 0;
      max-height: none;
      overflow-y: auto;
      padding-right: 4px;
    }

    .subtask-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-bottom: 12px;
    }

    .subtask-input {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid color-mix(in srgb, var(--medium) 14%, var(--border));
      border-radius: 10px;
      background: linear-gradient(180deg, var(--field-bg-strong), var(--field-bg));
      color: var(--text);
      outline: none;
    }

    .subtask-input:focus {
      border-color: var(--medium);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--medium) 22%, transparent);
    }

    .subtask-empty {
      color: var(--text-muted);
      font-size: 12px;
      padding: 12px;
      border: 1px dashed color-mix(in srgb, var(--medium) 18%, var(--border));
      border-radius: 10px;
      text-align: center;
      background: linear-gradient(180deg, color-mix(in srgb, var(--medium) 4%, transparent), transparent);
    }

    .subtask-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px 10px;
      padding: 8px 10px;
      border: 1px solid color-mix(in srgb, var(--medium) 14%, var(--border));
      border-radius: 10px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--medium) 7%, transparent), rgba(255,255,255,.02));
    }

    .subtask-item-main {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .subtask-item input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .subtask-item span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .subtask-item-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .subtask-move-btn,
    .subtask-delete-btn {
      flex: 0 0 auto;
      min-height: 24px;
      padding: 2px 8px;
      font-size: 10px;
    }

    .subtask-move-btn {
      min-width: 28px;
      padding-inline: 6px;
    }

    .subtask-item.is-done span {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* ── Responsive ──
       980 px: collapse to single column, un-sticky panels.
       760 px: stack header buttons, grid the filters bar.
       540 px: single-column everything, stack task-card body vertically. ── */
    @media (max-width: 980px) {
      body { overflow: auto; }
      .workspace-grid { grid-template-columns: 1fr; }
      .workspace-grid {
        height: auto;
        overflow: visible;
      }
      .app-header {
        align-items: flex-start;
        flex-wrap: wrap;
      }
      .app-header-main {
        width: 100%;
        flex-direction: column;
        align-items: stretch;
      }
      .list-panel {
        position: static;
        top: auto;
        align-self: auto;
        height: auto;
        overflow: visible;
      }
      .detail-panel {
        position: static;
        height: auto;
        overflow: visible;
      }
      .task-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .task-stats-secondary { grid-template-columns: 1fr; }
      .stats-group-list { grid-template-columns: repeat(auto-fit, minmax(104px, 1fr)); }
      .task-list {
        min-height: 300px;
        flex: 0 0 auto;
        max-height: none;
        overflow: visible;
        padding-right: 0;
      }
    }

    @media (max-width: 760px) {
      #taskForm .form-row:first-of-type { grid-template-columns: 1fr; }
      .app-header {
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 12px;
      }
      .app-header-main {
        gap: 12px;
      }
      .task-stats-header {
        max-width: none;
        width: 100%;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .task-stats-secondary-shell {
        padding: 8px;
      }
      .task-stats-secondary-tabs {
        gap: 5px;
      }
      .task-stats-secondary-tab {
        flex: 1 1 calc(33.333% - 5px);
        justify-content: center;
      }
      .header-actions {
        width: 100%;
        justify-content: flex-start;
      }
      .header-actions .btn {
        flex: 1 1 calc(50% - 10px);
        justify-content: center;
      }
      .main-content { padding: 12px 10px 20px; }
      .filters-strip {
        padding: 10px 10px 0;
      }
      .list-panel,
      .detail-panel {
        padding: 16px;
        border-radius: 18px;
      }
      .filters-bar {
        flex-wrap: wrap;
        gap: 8px;
        min-height: 52px;
      }
      .filters-bar select,
      .search-input,
      .toggle-done-btn {
        width: 100%;
      }
      .filters-bar select,
      .search-input {
        flex: 1 1 180px;
      }
      .toggle-done-btn {
        margin-left: 0;
        justify-content: center;
      }
      .task-list { min-height: 300px; }
      .empty-state { min-height: 280px; }
      .detail-empty { min-height: 260px; }
      .detail-header {
        flex-direction: column;
        align-items: stretch;
      }
      .detail-tabs {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .detail-tab-btn {
        width: 100%;
        justify-content: space-between;
      }
      .detail-header .btn {
        width: 100%;
        justify-content: center;
      }
      .detail-submeta {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .logs-meta {
        flex-wrap: wrap;
      }
      .log-submit-btn {
        width: 100%;
        justify-content: center;
      }
      .task-actions { justify-content: flex-start; }
    }

    @media (max-width: 540px) {
      .app-header { padding: 12px; }
      .app-header-main h1 {
        white-space: normal;
      }
      .header-actions { gap: 8px; }
      .header-actions .btn { flex-basis: 100%; }
      .form-row { grid-template-columns: 1fr; }
      .category-form-row { grid-template-columns: 1fr; }
      .subtask-form { grid-template-columns: 1fr; }
      .task-stats { grid-template-columns: 1fr; }
      .task-stats-header { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .task-stats-secondary { grid-template-columns: 1fr; }
      .task-stats-secondary-tab { flex-basis: 100%; }
      .stats-group-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .filters-strip { padding: 8px 10px 0; }
      .filters-bar {
        flex-wrap: wrap;
        padding: 8px;
        min-height: 50px;
      }
      .list-panel,
      .detail-panel { padding: 14px; }
      .task-card-body {
        grid-template-columns: 1fr;
      }
      .task-main,
      .task-actions {
        grid-column: auto;
      }
      .task-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: 100%;
      }
      .task-preview-list {
        grid-template-columns: 1fr;
      }
      .task-preview-dates {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        justify-items: stretch;
        min-width: 0;
      }
      .task-actions .btn,
      .task-actions .status-select,
      .task-actions .priority-select {
        width: 100%;
        justify-content: center;
      }
      .status-select,
      .priority-select { min-height: 40px; }
      .form-actions {
        flex-wrap: wrap;
      }
      .form-actions .btn {
        flex: 1 1 100%;
        justify-content: center;
      }
      .category-form-actions {
        align-items: stretch;
      }
      .category-form-buttons {
        width: 100%;
      }
      .category-form-buttons .btn {
        flex: 1 1 100%;
      }
      .empty-state,
      .detail-empty {
        min-height: 220px;
        padding: 28px 16px;
      }
      .detail-submeta { grid-template-columns: 1fr; }
      .detail-tabs { grid-template-columns: 1fr; }
      .logs-form { padding: 12px; }
      .log-submit-btn {
        width: 100%;
        justify-self: stretch;
        justify-content: center;
      }
      .detail-header,
      .detail-row,
      .logs-meta { display: grid; }
    }

    /* Flat UI mode requested by user: remove all shadows globally. */
    *, *::before, *::after {
      box-shadow: none !important;
      text-shadow: none !important;
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header class="app-header">
    <div class="app-header-main">
      <h1>Task <span>Manager</span></h1>
      <div class="task-stats task-stats-header" id="taskStats"></div>
    </div>
    <div class="header-actions">
      <button class="btn btn-header btn-header-theme" id="themeToggleBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
        <span class="btn-header-label">Light Mode</span>
      </button>
      <button class="btn btn-header btn-header-categories" id="manageCategoriesBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path d="M4 7h16"/><path d="M4 12h10"/><path d="M4 17h7"/><circle cx="18" cy="12" r="2.5"/><circle cx="14" cy="17" r="2.5"/></svg>
        <span class="btn-header-label">Categories</span>
      </button>
      <button class="btn btn-header btn-header-templates" id="manageTemplatesBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path d="M6 4.5h9l3 3V19.5a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-14a1 1 0 0 1 1-1Z"/><path d="M15 4.5V8h3"/><path d="M8 12h8"/><path d="M8 15.5h8"/></svg>
        <span class="btn-header-label">Templates</span>
      </button>
      <button class="btn btn-header btn-header-clear" id="clearCompletedBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path d="M9 3.5h6"/><path d="M4 7.5h16"/><path d="M6.5 7.5 7.3 19a1 1 0 0 0 1 .9h7.4a1 1 0 0 0 1-.9l.8-11.5"/><path d="M10 11v5"/><path d="M14 11v5"/></svg>
        <span class="btn-header-label">Clear Completed</span>
      </button>
      <button class="btn btn-header btn-header-export" id="exportExcelBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path d="M12 4v10"/><path d="m8.5 10.5 3.5 3.5 3.5-3.5"/><path d="M5 18.5h14"/></svg>
        <span class="btn-header-label">Export Excel</span>
      </button>
      <button class="btn btn-header btn-header-new" id="newTaskBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span class="btn-header-label">New Task</span>
      </button>
    </div>
  </header>

  <div class="filters-strip">
    <div class="filters-bar">
      <span class="filter-label">Filter:</span>
      <input type="search" id="searchTasks" class="search-input" placeholder="Search title, description, email subject, or notes" />
      <select id="filterCategory">
        <option value="">All Categories</option>
      </select>
      <select id="filterPriority">
        <option value="">All Priorities</option>
        <option value="Critical">Critical</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
        <option value="Very Low">Very Low</option>
      </select>
      <select id="filterStatus">
        <option value="">All Statuses</option>
        <option value="Pending">Pending</option>
        <option value="Not Started">Not Started</option>
        <option value="Ongoing">Ongoing</option>
        <option value="Waiting for Someone Else">Waiting for Someone Else</option>
        <option value="Done">Done</option>
      </select>
      <select id="sortTasks" class="sort-select">
        <option value="workflow">Sort: Workflow</option>
        <option value="due-date">Sort: Due Date</option>
        <option value="created-date">Sort: Created Date</option>
        <option value="priority">Sort: Priority</option>
        <option value="title">Sort: Title</option>
      </select>
      <button class="btn btn-ghost toggle-done-btn" id="toggleDoneBtn">Hide Completed</button>
    </div>
  </div>

  <!-- ── Main ── -->
  <main class="main-content">
    <div class="workspace-grid">
      <section class="list-panel">
        <!-- Stats -->
        <div class="task-stats-secondary-shell" id="taskStatsSecondaryShell">
          <div class="task-stats-secondary-bar">
            <span class="filter-label">More Stats</span>
            <button type="button" class="btn btn-ghost task-stats-secondary-toggle" id="toggleTaskStatsSecondaryBtn" aria-expanded="true">Hide Details</button>
          </div>
          <div class="task-stats-secondary" id="taskStatsSecondary"></div>
        </div>

        <!-- Task List -->
        <div class="task-list" id="taskList"></div>
      </section>

      <aside class="detail-panel" id="taskDetailPanel"></aside>
    </div>

  </main>

  <!-- ── New Task Modal ── -->
  <div class="modal-backdrop" id="taskModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle">New Task</h2>
      <form id="taskForm" novalidate>

        <div class="form-group">
          <label for="taskTitle">Title *</label>
          <input type="text" id="taskTitle" placeholder="Task title…" required />
        </div>

        <div class="form-group">
          <label for="taskTemplate">Template</label>
          <select id="taskTemplate">
            <option value="">No Template</option>
          </select>
        </div>

        <div class="form-group">
          <label for="taskEmailSubject">Email Subject</label>
          <input type="text" id="taskEmailSubject" placeholder="Optional subject line" />
        </div>

        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" placeholder="Short task summary or context..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="taskCategory">Category</label>
            <select id="taskCategory"></select>
          </div>
          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="Critical">Critical</option>
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
              <option value="Very Low">Very Low</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskStatus">Status</label>
            <select id="taskStatus">
              <option value="Pending">Pending</option>
              <option value="Not Started">Not Started</option>
              <option value="Ongoing">Ongoing</option>
              <option value="Waiting for Someone Else">Waiting for Someone Else</option>
              <option value="Done">Done</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="taskReceivedAt">Received Date</label>
            <input type="date" id="taskReceivedAt" />
          </div>
          <div class="form-group">
            <label for="taskDueDate">Due Date</label>
            <input type="date" id="taskDueDate" />
          </div>
        </div>

        <div class="form-group">
          <label for="taskNotes">Notes</label>
          <textarea id="taskNotes" placeholder="Optional notes…"></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="cancelTaskBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitTaskBtn">Create Task</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-backdrop" id="categoryModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="categoryModalTitle">
      <h2 id="categoryModalTitle">Manage Categories</h2>
      <form id="categoryForm" novalidate>
        <div class="category-form-row">
          <div class="form-group">
            <label for="categoryName">Name *</label>
            <input type="text" id="categoryName" placeholder="Category name" required />
          </div>
          <div class="form-group">
            <label for="categoryColor">Color</label>
            <input type="color" id="categoryColor" class="color-input" value="#5b8def" />
          </div>
        </div>

        <div class="form-actions category-form-actions">
          <div class="category-color-presets" aria-label="Default category colors">
            <span class="category-color-presets-label">Presets</span>
            <button type="button" class="category-color-preset" data-category-color="#64748b" style="--preset-color:#64748b" aria-label="Use slate color"></button>
            <button type="button" class="category-color-preset" data-category-color="#ef7d57" style="--preset-color:#ef7d57" aria-label="Use orange color"></button>
            <button type="button" class="category-color-preset" data-category-color="#34c38f" style="--preset-color:#34c38f" aria-label="Use green color"></button>
            <button type="button" class="category-color-preset" data-category-color="#f4b740" style="--preset-color:#f4b740" aria-label="Use amber color"></button>
            <button type="button" class="category-color-preset" data-category-color="#5b8def" style="--preset-color:#5b8def" aria-label="Use blue color"></button>
            <button type="button" class="category-color-preset" data-category-color="#8b5cf6" style="--preset-color:#8b5cf6" aria-label="Use violet color"></button>
            <button type="button" class="category-color-preset" data-category-color="#ec4899" style="--preset-color:#ec4899" aria-label="Use pink color"></button>
            <button type="button" class="category-color-preset" data-category-color="#14b8a6" style="--preset-color:#14b8a6" aria-label="Use teal color"></button>
          </div>
          <div class="category-form-buttons">
            <button type="button" class="btn btn-ghost" id="cancelCategoryBtn">Close</button>
            <button type="submit" class="btn btn-primary" id="submitCategoryBtn">Save Category</button>
          </div>
        </div>
      </form>

      <div class="category-list" id="categoryList"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="templateModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="templateModalTitle">
      <h2 id="templateModalTitle">Manage Templates</h2>
      <form id="templateForm" novalidate>
        <div class="form-group">
          <label for="templateName">Name *</label>
          <input type="text" id="templateName" placeholder="Template name" required />
        </div>
        <div class="form-group">
          <label for="templateSubtasks">Subtasks</label>
          <textarea id="templateSubtasks" placeholder="One subtask per line"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="cancelTemplateBtn">Close</button>
          <button type="submit" class="btn btn-primary" id="submitTemplateBtn">Save Template</button>
        </div>
      </form>

      <div class="template-list" id="templateList"></div>
    </div>
  </div>

  <div class="context-menu" id="detailContextMenu" role="menu" aria-label="Task detail actions" hidden>
    <div class="context-menu-label">Task Actions</div>
    <button type="button" class="context-menu-btn is-edit" data-context-action="edit" role="menuitem">
      <span class="context-menu-main">
        <span class="context-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 20h4l10-10-4-4L4 16v4Z"/><path d="m12.5 7.5 4 4"/></svg></span>
        <span>Edit task</span>
      </span>
      <strong>Open</strong>
    </button>
    <button type="button" class="context-menu-btn is-toggle" data-context-action="toggle-status" role="menuitem">
      <span class="context-menu-main">
        <span class="context-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m5 13 4 4L19 7"/></svg></span>
        <span id="detailContextToggleLabel">Mark done</span>
      </span>
      <strong>State</strong>
    </button>
    <button type="button" class="context-menu-btn is-description" data-context-action="show-description" role="menuitem">
      <span class="context-menu-main">
        <span class="context-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 4.5h10l3 3V19.5a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-14a1 1 0 0 1 1-1Z"/><path d="M17 4.5V8h3"/><path d="M9 12h6"/><path d="M9 15.5h6"/></svg></span>
        <span>Open description</span>
      </span>
      <strong>Tab</strong>
    </button>
    <button type="button" class="context-menu-btn is-subtasks" data-context-action="show-subtasks" role="menuitem">
      <span class="context-menu-main">
        <span class="context-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 7h10"/><path d="M9 12h10"/><path d="M9 17h10"/><path d="M4 7h.01"/><path d="M4 12h.01"/><path d="M4 17h.01"/></svg></span>
        <span>Open subtasks</span>
      </span>
      <strong>Tab</strong>
    </button>
    <button type="button" class="context-menu-btn is-logs" data-context-action="show-logs" role="menuitem">
      <span class="context-menu-main">
        <span class="context-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 5h14v14H5z"/><path d="M8.5 9h7"/><path d="M8.5 12h7"/><path d="M8.5 15h5"/></svg></span>
        <span>Open logs</span>
      </span>
      <strong>Tab</strong>
    </button>
    <button type="button" class="context-menu-btn is-duplicate" data-context-action="duplicate" role="menuitem">
      <span class="context-menu-main">
        <span class="context-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="8" y="8" width="11" height="11" rx="2"/><path d="M5 15V5a1 1 0 0 1 1-1h10"/></svg></span>
        <span>Duplicate task</span>
      </span>
      <strong>Copy</strong>
    </button>
    <button type="button" class="context-menu-btn is-delete" data-context-action="delete" role="menuitem">
      <span class="context-menu-main">
        <span class="context-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 3.5h6"/><path d="M4 7.5h16"/><path d="M6.5 7.5 7.3 19a1 1 0 0 0 1 .9h7.4a1 1 0 0 0 1-.9l.8-11.5"/><path d="M10 11v5"/><path d="M14 11v5"/></svg></span>
        <span>Delete task</span>
      </span>
      <strong>Danger</strong>
    </button>
  </div>

  <!-- XLSX library (cdn) used for the Export Excel feature. -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    // ── Storage Keys ──
    // Centralised localStorage key names so they never get mis-typed elsewhere.
    const KEYS = {
      tasks: 'tm_tasks',
      logs: 'tm_logs',
      categories: 'tm_categories',
      templates: 'tm_templates',
      hideDone: 'tm_hide_done',
      theme: 'tm_theme',
      showSecondaryStats: 'tm_show_secondary_stats'
    };

    function loadJson(key, fallback) {
      try {
        const rawValue = localStorage.getItem(key);
        return rawValue ? JSON.parse(rawValue) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function loadPreference(key, fallback = null) {
      const value = localStorage.getItem(key);
      return value === null ? fallback : value;
    }

    function savePreference(key, value) {
      localStorage.setItem(key, String(value));
    }

    // ── State ──
    // In-memory arrays kept in sync with localStorage via the save* helpers.
    // selectedTaskId tracks which card is active / shown in the detail panel.
    let tasks       = [];
    let logs        = [];
    let categories  = [];
    let templates   = [];
    let hideDone    = false;
    let showSecondaryStats = true;
    let currentTheme = 'dark';
    let editingId   = null;
    let editingCategoryName = null;
    let editingTemplateId = null;
    let selectedTaskId = null;
    let activeSecondaryStatsTab = 'status';
    let activeDetailTab = 'description';

    const INPUT_LIMITS = {
      searchTasks: 60,
      taskTitle: 100,
      taskEmailSubject: 120,
      taskDescription: 500,
      taskNotes: 500,
      categoryName: 60,
      templateName: 80,
      templateSubtasks: 800,
      subtaskTitle: 80,
      logContent: 800,
    };

    const PRIORITY_OPTIONS = ['Critical', 'High', 'Medium', 'Low', 'Very Low'];
    const STATUS_OPTIONS = ['Not Started','Pending','Ongoing', 'Waiting for Someone Else', 'Done'];
    const DEFAULT_PRIORITY = 'Medium';
    const DEFAULT_STATUS = 'Not Started';
    const LEGACY_STATUS_ALIASES = {
      Completed: 'Done'
    };
    const ATTENTION_PRIORITIES = new Set(['Critical', 'High']);
    const PRIORITY_ORDER = Object.fromEntries(PRIORITY_OPTIONS.map((priority, index) => [priority, index]));
    const STATUS_ACCENTS = {
      'Not Started': 'var(--status-not-started)',
      Pending: 'var(--status-pending)',
      Ongoing: 'var(--status-ongoing)',
      'Waiting for Someone Else': 'var(--status-waiting)',
      Done: 'var(--status-done)'
    };
    const PRIORITY_ACCENTS = {
      Critical: 'var(--critical)',
      High: 'var(--high)',
      Medium: 'var(--medium)',
      Low: 'var(--low)',
      'Very Low': 'var(--very-low)'
    };
    const STATUS_ORDER = {
      Ongoing: 0,
      Pending: 1,
      'Waiting for Someone Else': 2,
      'Not Started': 3,
      Done: 4
    };

    const MONTH_LABELS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const INPUT_FIELDS_WITHOUT_COUNTER = new Set(['searchTasks', 'categoryName']);

    function updateInputCounter(field, counter, limit) {
      const currentLength = field.value.length;
      counter.textContent = `${currentLength}/${limit}`;
      counter.classList.toggle('is-near-limit', currentLength >= Math.floor(limit * 0.85) && currentLength < limit);
      counter.classList.toggle('is-at-limit', currentLength >= limit);
    }

    function ensureInputCounter(fieldId, limit) {
      const field = document.getElementById(fieldId);
      if (!field) return;

      field.maxLength = limit;

      if (INPUT_FIELDS_WITHOUT_COUNTER.has(fieldId)) {
        const existingWrapper = field.parentElement?.classList.contains('input-counter-wrap')
          ? field.parentElement
          : null;
        const existingCounter = existingWrapper?.querySelector(`.input-counter[data-for="${fieldId}"]`);

        existingCounter?.remove();

        if (existingWrapper) {
          existingWrapper.insertAdjacentElement('beforebegin', field);
          existingWrapper.remove();
        }

        return;
      }

      let wrapper = field.parentElement;
      if (!wrapper?.classList.contains('input-counter-wrap')) {
        wrapper = document.createElement('div');
        wrapper.className = 'input-counter-wrap';
        field.insertAdjacentElement('beforebegin', wrapper);
        wrapper.appendChild(field);
      }

      let counter = wrapper.querySelector(`.input-counter[data-for="${fieldId}"]`);
      if (!counter) {
        counter = document.createElement('div');
        counter.className = 'input-counter';
        counter.dataset.for = fieldId;
        field.insertAdjacentElement('afterend', counter);
      }

      updateInputCounter(field, counter, limit);

      if (!field.dataset.counterBound) {
        field.addEventListener('input', () => updateInputCounter(field, counter, limit));
        field.dataset.counterBound = 'true';
      }
    }

    function applyInputLimits() {
      Object.entries(INPUT_LIMITS).forEach(([fieldId, limit]) => ensureInputCounter(fieldId, limit));
    }

    // ── Persistence ──
    // loadState() reads everything from localStorage on startup,
    // normalises legacy values, and ensures required defaults exist.
    function loadState() {
      tasks = loadJson(KEYS.tasks, []);
      logs = loadJson(KEYS.logs, []);
      categories = loadJson(KEYS.categories, []);
      templates = loadJson(KEYS.templates, []);
      hideDone = loadPreference(KEYS.hideDone, 'false') === 'true';
      showSecondaryStats = loadPreference(KEYS.showSecondaryStats, 'true') !== 'false';
      currentTheme = loadPreference(KEYS.theme, document.documentElement.dataset.theme || 'dark');

      if (!categories.length) {
        categories = getDefaultCategories();
      }

      categories = categories
        .map(category => ({
          name: normalizeCategoryName(category.name),
          color: category.color || '#5b8def'
        }))
        .filter(category => category.name);

      if (!getCategoryByName('General')) {
        categories.unshift({ name: 'General', color: '#64748b' });
      }

      const fallbackCategory = 'General';
      tasks = tasks.map(task => ({
        ...task,
        description: String(task.description || '').trim() || null,
        emailSubject: String(task.emailSubject || '').trim() || null,
        category: getCategoryByName(task.category)?.name || fallbackCategory,
        priority: normalizePriority(task.priority),
        status: normalizeStatus(task.status),
        subtasks: Array.isArray(task.subtasks) ? task.subtasks : []
      }));
    }

    function saveTasks() {
      saveJson(KEYS.tasks, tasks);
    }

    function saveLogs() {
      saveJson(KEYS.logs, logs);
    }

    function saveCategories() {
      saveJson(KEYS.categories, categories);
    }

    function saveTemplates() {
      saveJson(KEYS.templates, templates);
    }

    function saveHideDonePreference() {
      savePreference(KEYS.hideDone, hideDone);
    }

    function saveSecondaryStatsPreference() {
      savePreference(KEYS.showSecondaryStats, showSecondaryStats);
    }

    function applyTheme(theme) {
      const nextTheme = theme === 'light' ? 'light' : 'dark';
      currentTheme = nextTheme;
      document.documentElement.classList.remove('theme-light', 'theme-dark');
      document.documentElement.classList.add(`theme-${nextTheme}`);
      document.documentElement.dataset.theme = nextTheme;
      savePreference(KEYS.theme, nextTheme);
      updateThemeToggleLabel();
    }

    function toggleTheme() {
      applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    }

    function updateThemeToggleLabel() {
      const toggleButton = document.getElementById('themeToggleBtn');
      if (!toggleButton) return;
      const iconMarkup = currentTheme === 'dark'
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2.5v2.2"/><path d="M12 19.3v2.2"/><path d="m4.9 4.9 1.6 1.6"/><path d="m17.5 17.5 1.6 1.6"/><path d="M2.5 12h2.2"/><path d="M19.3 12h2.2"/><path d="m4.9 19.1 1.6-1.6"/><path d="m17.5 6.5 1.6-1.6"/></svg>';
      toggleButton.innerHTML = `${iconMarkup}<span class="btn-header-label">${currentTheme === 'dark' ? 'Light Mode' : 'Dark Mode'}</span>`;
    }

    function syncCategoryColorPresets(colorValue = '') {
      const normalizedColor = String(colorValue || '').trim().toLowerCase();
      document.querySelectorAll('.category-color-preset').forEach(button => {
        button.classList.toggle('is-active', button.dataset.categoryColor.toLowerCase() === normalizedColor);
      });
    }

    function closeDetailContextMenu() {
      const menu = document.getElementById('detailContextMenu');
      if (!menu) return;
      menu.hidden = true;
    }

    function openDetailContextMenu(x, y) {
      const task = getTaskById(selectedTaskId);
      const menu = document.getElementById('detailContextMenu');
      if (!task || !menu) return;

      const toggleLabel = document.getElementById('detailContextToggleLabel');
      if (toggleLabel) {
        toggleLabel.textContent = isTaskCompleted(task) ? 'Reopen task' : 'Mark done';
      }

      menu.hidden = false;
      menu.style.left = '0px';
      menu.style.top = '0px';

      const menuRect = menu.getBoundingClientRect();
      const maxLeft = Math.max(window.innerWidth - menuRect.width - 10, 10);
      const maxTop = Math.max(window.innerHeight - menuRect.height - 10, 10);
      menu.style.left = `${Math.min(Math.max(x, 10), maxLeft)}px`;
      menu.style.top = `${Math.min(Math.max(y, 10), maxTop)}px`;
    }

    function updateSecondaryStatsToggle() {
      const shell = document.getElementById('taskStatsSecondaryShell');
      const toggleButton = document.getElementById('toggleTaskStatsSecondaryBtn');
      if (!shell || !toggleButton) return;

      shell.classList.toggle('is-collapsed', !showSecondaryStats);
      toggleButton.textContent = showSecondaryStats ? 'Hide Details' : 'Show Details';
      toggleButton.setAttribute('aria-expanded', String(showSecondaryStats));
    }

    // ── ID Generator ──
    // Collision-resistant short ID built from timestamp + random suffix.
    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function normalizeOptionValue(value, options, fallback, aliases = {}) {
      const rawValue = String(value || '').trim();
      if (!rawValue) return fallback;

      const aliasMatch = Object.entries(aliases)
        .find(([key]) => key.toLowerCase() === rawValue.toLowerCase());
      const resolvedValue = aliasMatch ? aliasMatch[1] : rawValue;

      return options.find(option => option.toLowerCase() === String(resolvedValue).toLowerCase()) || fallback;
    }

    function normalizePriority(priority) {
      return normalizeOptionValue(priority, PRIORITY_OPTIONS, DEFAULT_PRIORITY);
    }

    function normalizeStatus(status) {
